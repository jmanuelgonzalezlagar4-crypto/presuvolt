<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PresuVolt — Presupuestos por nota de voz</title>
<meta name="theme-color" content="#1A1C1E">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --grafito:#1A1C1E; --papel:#FBFBF9; --amarillo:#F5C400; --wa:#1FAF54;
    --linea:#DDDDD6; --gris:#5B5E63; --rojo:#B91C1C; --verde:#15803d;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Barlow',-apple-system,sans-serif;background:var(--papel);color:var(--grafito);font-size:16px;line-height:1.5}
  .cinta{background:repeating-linear-gradient(-45deg,var(--amarillo) 0 14px,var(--grafito) 14px 28px);height:7px}
  header{background:var(--grafito);color:var(--papel);padding:0 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .logo{font-family:'Barlow Semi Condensed',sans-serif;font-weight:800;font-size:1.25rem;letter-spacing:.5px;text-transform:uppercase;padding:13px 0}
  .logo span{background:var(--amarillo);color:var(--grafito);padding:0 5px}
  nav.sup{display:flex;gap:2px}
  nav.sup button{background:transparent;border:none;color:#9a9da1;padding:16px 13px;font-size:.92rem;cursor:pointer;border-bottom:3px solid transparent;font-family:'Barlow Semi Condensed',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
  nav.sup button:hover{color:#fff}
  nav.sup button.activo{color:var(--amarillo);border-bottom-color:var(--amarillo)}
  .hdr-der{margin-left:auto;display:flex;gap:8px;padding:8px 0}
  main{max-width:1000px;margin:0 auto;padding:22px 18px 60px}
  .tarjeta{background:#fff;border:1.5px solid var(--linea);border-radius:12px;padding:20px;margin-bottom:16px}
  h2{font-family:'Barlow Semi Condensed',sans-serif;font-weight:800;font-size:1.35rem;text-transform:uppercase;letter-spacing:-.2px}
  h3.sub{font-family:'Barlow Semi Condensed',sans-serif;font-weight:700;font-size:1.02rem;text-transform:uppercase;margin:18px 0 10px}
  .fila-titulo{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:'Barlow Semi Condensed',sans-serif;font-weight:700;font-size:.98rem;text-transform:uppercase;letter-spacing:.5px;padding:12px 20px;border-radius:6px;border:2px solid var(--grafito);cursor:pointer;background:var(--grafito);color:var(--amarillo);text-decoration:none}
  .btn:active{transform:scale(.97)}
  .btn.amarillo{background:var(--amarillo);color:var(--grafito);border-color:var(--amarillo)}
  .btn.sec{background:#fff;color:var(--grafito)}
  .btn.wa{background:var(--wa);border-color:var(--wa);color:#fff}
  .btn.peligro{background:#fff;color:var(--rojo);border-color:#fca5a5}
  .btn.mini{padding:8px 13px;font-size:.85rem}
  .btn-icono{background:none;border:none;cursor:pointer;font-size:17px;padding:6px 8px;border-radius:6px;color:var(--gris)}
  .btn-icono:hover{background:#f1f0ec;color:var(--grafito)}
  label{display:block;font-family:'Barlow Semi Condensed',sans-serif;font-weight:600;font-size:.8rem;text-transform:uppercase;letter-spacing:.8px;color:var(--gris);margin-bottom:4px}
  input,select,textarea{width:100%;padding:10px 12px;border:1.5px solid #c9c9c2;border-radius:6px;font-size:16px;font-family:'Barlow',sans-serif;background:#fff;color:var(--grafito)}
  input:focus,select:focus,textarea:focus{outline:2.5px solid var(--amarillo);border-color:var(--grafito)}
  textarea{resize:vertical}
  .rejilla{display:grid;gap:14px}
  .c2{grid-template-columns:1fr 1fr}
  .c3{grid-template-columns:1fr 1fr 1fr}
  @media(max-width:640px){.c2,.c3{grid-template-columns:1fr}}
  .aviso{background:#FFF8DC;border:1.5px solid var(--amarillo);border-radius:8px;padding:10px 14px;font-size:.85rem;margin-bottom:16px}
  .chip{display:inline-block;padding:3px 10px;border-radius:99px;font-family:'IBM Plex Mono',monospace;font-size:.7rem;font-weight:600;text-transform:uppercase;white-space:nowrap}
  .chip.ref{background:#f1f0ec;color:var(--gris)}
  .chip.mio{background:#FFF3B8;color:#7a6200;border:1px solid var(--amarillo)}
  .chip.borrador{background:#f1f0ec;color:var(--gris)}
  .chip.enviado{background:#e5f0ff;color:#1d4ed8}
  .chip.aceptado{background:#eafaf0;color:var(--verde)}
  .chip.pendiente{background:#FFF3B8;color:#7a6200;border:1px solid var(--amarillo)}
  .chip.facturado{background:#eafaf0;color:var(--verde)}
  .firma-mini{max-height:70px;border:1.5px solid var(--linea);border-radius:6px;background:#fff;padding:4px}
  .dia-entrada{display:grid;grid-template-columns:56px 1fr auto;gap:12px;align-items:center;border:1.5px solid var(--linea);border-radius:10px;padding:10px 12px;margin-bottom:8px;cursor:pointer;background:#fff}
  .dia-entrada:hover{border-color:var(--amarillo);background:#FFFDF2}
  .dia-hora{display:flex;flex-direction:column;align-items:center;font-family:'IBM Plex Mono',monospace;font-size:.78rem;font-weight:600;background:var(--grafito);color:var(--amarillo);border-radius:8px;padding:6px 4px}
  .dia-flecha{color:#9a9da1;font-size:.7rem;line-height:1}
  .dia-txt{font-size:.95rem;line-height:1.35}
  .dia-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px}
  .dia-acciones{display:flex;flex-direction:column;gap:2px}
  /* ---- pantalla nota de voz ---- */
  .nota-hero{text-align:center;padding:8px 0 4px}
  .nota-hero p.guia{color:var(--gris);max-width:52ch;margin:0 auto 18px;font-size:.98rem}
  .btn-voz{width:120px;height:120px;border-radius:50%;border:4px solid var(--grafito);background:var(--amarillo);font-size:44px;cursor:pointer;box-shadow:0 8px 22px rgba(26,28,30,.22);transition:transform .1s}
  .btn-voz:active{transform:scale(.94)}
  .btn-voz.grabando{background:#dc2626;border-color:#dc2626;animation:pulso 1.1s infinite}
  @keyframes pulso{0%{box-shadow:0 0 0 0 rgba(220,38,38,.45)}70%{box-shadow:0 0 0 20px rgba(220,38,38,0)}100%{box-shadow:0 0 0 0 rgba(220,38,38,0)}}
  .estado-voz{font-family:'IBM Plex Mono',monospace;font-size:.8rem;text-transform:uppercase;letter-spacing:1px;color:var(--gris);margin-top:10px}
  #texto-nota{min-height:110px;margin-top:16px;font-size:16px}
  .ejemplo{font-size:.85rem;color:var(--gris);font-style:italic;margin-top:10px}
  /* ---- editor ---- */
  .linea-item{display:grid;grid-template-columns:1fr 74px 92px 96px 34px;gap:8px;align-items:center;margin-bottom:8px}
  .cab-lineas{display:grid;grid-template-columns:1fr 74px 92px 96px 34px;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:.62rem;font-weight:600;color:var(--gris);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
  @media(max-width:640px){.linea-item,.cab-lineas{grid-template-columns:1fr 52px 76px 80px 30px}}
  .linea-item input{padding:8px 8px;font-size:15px}
  .venta{font-family:'IBM Plex Mono',monospace;text-align:right;background:#f6f5f0!important}
  .caja-totales{background:#f6f5f0;border:1.5px solid var(--linea);border-radius:8px;padding:14px 18px;margin-top:14px;max-width:360px;margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:.92rem}
  .caja-totales .fila{display:flex;justify-content:space-between;padding:3px 0;gap:12px}
  .caja-totales .fila.privado{color:var(--gris);font-size:.8rem}
  .caja-totales .fila.total{font-weight:600;font-size:1.05rem;background:var(--amarillo);margin:8px -8px -4px;padding:9px 10px;border-radius:4px}
  .nota-privada{font-size:.78rem;color:var(--gris);text-align:right;margin-top:6px}
  /* ---- listas ---- */
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-family:'IBM Plex Mono',monospace;font-size:.68rem;text-transform:uppercase;letter-spacing:.5px;color:var(--gris);padding:8px 10px;border-bottom:2px solid var(--grafito);font-weight:600}
  td{padding:10px;border-bottom:1px dashed var(--linea);vertical-align:middle;font-size:.95rem}
  tr.clicable{cursor:pointer}
  tr.clicable:hover{background:#f6f5f0}
  .num{text-align:right;font-variant-numeric:tabular-nums;font-family:'IBM Plex Mono',monospace;font-size:.88rem}
  .vacio{text-align:center;color:var(--gris);padding:38px 16px}
  .lista-movil{display:none}
  .tarjeta-item{border:1.5px solid var(--linea);border-radius:12px;padding:12px 14px;margin-bottom:10px;background:#fff}
  .ti-cab{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .ti-cli{font-weight:600;font-size:1rem;margin-top:2px}
  .ti-sub{font-size:.82rem;color:var(--gris)}
  .ti-pie{display:flex;justify-content:space-between;align-items:center;margin-top:8px;gap:8px}
  .ti-total{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:1.05rem}
  .buscador{max-width:260px}
  .pie-form{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap}
  .sep{height:1.5px;background:var(--linea);margin:18px 0}
  .logo-prev{max-height:56px;max-width:170px;border:1.5px solid var(--linea);border-radius:6px;padding:4px;background:#fff}
  /* ---- precios ---- */
  .precio-fila{display:grid;grid-template-columns:1fr 64px 104px 92px 34px;gap:8px;align-items:center;margin-bottom:8px}
  @media(max-width:640px){.precio-fila{grid-template-columns:1fr 50px 84px 76px 30px}}
  .precio-fila input{padding:8px;font-size:15px}
  /* ---- nav inferior móvil ---- */
  #nav-movil{display:none;position:fixed;left:0;right:0;bottom:0;background:var(--grafito);z-index:60;justify-content:space-around;padding:5px 4px calc(5px + env(safe-area-inset-bottom))}
  #nav-movil button{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:1px;font-family:'Barlow Semi Condensed',sans-serif;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#9a9da1;padding:5px 12px;border-radius:10px;cursor:pointer}
  #nav-movil button.activo{color:var(--amarillo)}
  #nav-movil button .ico{font-size:21px;line-height:1.2}
  @media(max-width:640px){
    nav.sup{display:none}
    #nav-movil{display:flex}
    main{padding:14px 12px 96px}
    .btn{padding:13px 18px}
    .pie-form .btn{flex:1}
    .buscador{max-width:100%;flex:1}
    .fila-titulo>div{width:100%}
    .tabla-escritorio{display:none}
    .lista-movil{display:block}
    .caja-totales{max-width:100%}
    .hdr-der{margin-left:auto}
  }
  /* ---- impresión ---- */
  #zona-impresion{display:none}
  @media print{
    body>.cinta,body>header,body>main,#nav-movil,#modal{display:none!important}
    body{background:#fff}
    #zona-impresion{display:block;color:#000}
  }
  .doc{max-width:760px;margin:0 auto;padding:10px;font-family:'Barlow',sans-serif}
  .doc-cinta{background:repeating-linear-gradient(-45deg,#F5C400 0 12px,#1A1C1E 12px 24px);height:6px;margin-bottom:16px}
  .doc-cab{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;border-bottom:3px solid #1A1C1E;padding-bottom:12px;margin-bottom:14px}
  .doc-cab img{max-height:64px;max-width:190px}
  .doc-cab .emp{font-size:12.5px;line-height:1.45}
  .doc-cab .emp strong{font-size:16px;font-family:'Barlow Semi Condensed',sans-serif;text-transform:uppercase}
  .doc-tit{text-align:right;font-family:'IBM Plex Mono',monospace;font-size:12px}
  .doc-tit h2{font-family:'Barlow Semi Condensed',sans-serif;font-size:19px;text-transform:uppercase;margin-bottom:2px}
  .doc-cliente{background:#f6f5f0;border:1.5px solid #DDDDD6;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12.5px}
  .doc-lineas{font-family:'IBM Plex Mono',monospace;font-size:12px;margin-bottom:12px}
  .doc-lineas .cab{display:flex;justify-content:space-between;border-bottom:2px solid #1A1C1E;padding-bottom:6px;margin-bottom:6px;font-weight:600;text-transform:uppercase;font-size:10.5px;letter-spacing:.5px}
  .doc-lineas .l{display:flex;justify-content:space-between;gap:10px;padding:5px 0;border-bottom:1px dashed #DDDDD6}
  .doc-lineas .l .c{flex:1}
  .doc-lineas .l .i{white-space:nowrap;font-weight:500}
  .doc-total{display:flex;justify-content:space-between;background:#F5C400;padding:10px 12px;border-radius:4px;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:14px;margin-top:10px}
  .doc-iva{display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:12px;padding:4px 12px 0}
  .doc .obs{margin-top:14px;font-size:11.5px;color:#475569;white-space:pre-wrap}
  .doc-pie{margin-top:26px;font-size:10.5px;color:#5B5E63;border-top:1.5px solid #DDDDD6;padding-top:8px}
  .doc-firmas{display:flex;gap:30px;margin-top:28px}
  .doc-firmas>div{flex:1}
  .doc-firmas .hueco{height:78px;display:flex;align-items:flex-end;justify-content:center}
  .doc-firmas .hueco img{max-height:74px;max-width:100%}
  .doc-firmas .linea{border-top:1px solid #5B5E63;padding-top:6px;font-size:10.5px;color:#5B5E63;text-align:center;font-family:'IBM Plex Mono',monospace;text-transform:uppercase}
</style>
</head>
<body>
<div class="cinta"></div>
<header>
  <div class="logo">Presu<span>Volt</span></div>
  <nav class="sup" id="nav"></nav>
  <div class="hdr-der">
    <button class="btn sec mini" onclick="exportarDatos()">💾 Copia</button>
    <button class="btn sec mini" onclick="document.getElementById('importar').click()">📂 Cargar</button>
    <input type="file" id="importar" accept=".json" style="display:none" onchange="importarDatos(event)">
  </div>
</header>
<main id="app"></main>
<div id="zona-impresion"></div>
<nav id="nav-movil"></nav>
<div id="modal"></div>
<script>
"use strict";
/* ================= BASE DE PRECIOS DE REFERENCIA ================= */
function preciosReferencia(){
  return [
    {k:"panel",    nombre:"Módulo FV 550 W mono",                 unidad:"ud", precio:124,  ref:true, esMO:false},
    {k:"inv3",     nombre:"Inversor híbrido 3 kW",                unidad:"ud", precio:790,  ref:true, esMO:false},
    {k:"inv5",     nombre:"Inversor híbrido 5 kW",                unidad:"ud", precio:1150, ref:true, esMO:false},
    {k:"inv6",     nombre:"Inversor híbrido 6 kW",                unidad:"ud", precio:1290, ref:true, esMO:false},
    {k:"inv10",    nombre:"Inversor híbrido 10 kW",               unidad:"ud", precio:1980, ref:true, esMO:false},
    {k:"bateria",  nombre:"Batería litio 5 kWh",                  unidad:"ud", precio:1600, ref:true, esMO:false},
    {k:"estructura",nombre:"Estructura coplanar + anclajes (por panel)",unidad:"ud", precio:42, ref:true, esMO:false},
    {k:"cable",    nombre:"Cableado y canalización (por metro)",  unidad:"m",  precio:5.6,  ref:true, esMO:false},
    {k:"cuadro",   nombre:"Cuadro nuevo con protecciones CA/CC",  unidad:"ud", precio:380,  ref:true, esMO:false},
    {k:"magneto",  nombre:"Magnetotérmico",                       unidad:"ud", precio:18,   ref:true, esMO:false},
    {k:"diferencial",nombre:"Diferencial",                        unidad:"ud", precio:45,   ref:true, esMO:false},
    {k:"bomba",    nombre:"Kit bombeo solar",                     unidad:"ud", precio:950,  ref:true, esMO:false},
    {k:"legalizacion",nombre:"Legalización y tramitación RD 244/2019",unidad:"ud", precio:350, ref:true, esMO:false},
    {k:"jornada",  nombre:"Mano de obra (jornada operario)",      unidad:"jorn", precio:240, ref:true, esMO:true},
    {k:"hora",     nombre:"Mano de obra (hora)",                  unidad:"h",  precio:30,   ref:true, esMO:true},
    {k:"desplazamiento",nombre:"Desplazamiento / aviso",          unidad:"ud", precio:45,   ref:true, esMO:true},
    {k:"bombasum", nombre:"Bomba sumergida",                      unidad:"ud", precio:680,  ref:true, esMO:false},
    {k:"bombapres",nombre:"Grupo de presión",                     unidad:"ud", precio:420,  ref:true, esMO:false},
    {k:"variador", nombre:"Variador de frecuencia solar",         unidad:"ud", precio:850,  ref:true, esMO:false},
    {k:"puntoluz", nombre:"Punto de luz",                         unidad:"ud", precio:28,   ref:true, esMO:false},
    {k:"enchufe",  nombre:"Punto de enchufe",                     unidad:"ud", precio:26,   ref:true, esMO:false},
    {k:"cuadroind",nombre:"Cuadro industrial trifásico",          unidad:"ud", precio:950,  ref:true, esMO:false},
    {k:"cargador", nombre:"Cargador coche eléctrico (wallbox)",   unidad:"ud", precio:750,  ref:true, esMO:false}
  ];
}
/* ================= PLANTILLAS DE PRESUPUESTO ================= */
const PLANTILLAS = [
  {cat:"☀️ Solar / Fotovoltaica", subs:[
    {nombre:"Autoconsumo vivienda", lineas:[["panel",8],["inv5",1],["estructura",8],["cable",25],["cuadro",1],["legalizacion",1],["jornada",4]]},
    {nombre:"Aislada (sin red)",    lineas:[["panel",8],["inv5",1],["bateria",2],["estructura",8],["cable",20],["cuadro",1],["jornada",4]]},
    {nombre:"Industrial / nave",    lineas:[["panel",20],["inv10",1],["estructura",20],["cable",60],["cuadroind",1],["legalizacion",1],["jornada",8]]}
  ]},
  {cat:"💧 Bombeo", subs:[
    {nombre:"Bombeo solar",     lineas:[["panel",6],["variador",1],["bombasum",1],["estructura",6],["cable",40],["cuadro",1],["jornada",3]]},
    {nombre:"Bombeo normal",    lineas:[["bomba",1],["cable",30],["cuadro",1],["jornada",2]]},
    {nombre:"Bomba sumergida",  lineas:[["bombasum",1],["cable",50],["cuadro",1],["jornada",2]]},
    {nombre:"Grupo de presión", lineas:[["bombapres",1],["cable",10],["jornada",1]]}
  ]},
  {cat:"🏠 Vivienda", subs:[
    {nombre:"Vivienda nueva",  lineas:[["puntoluz",25],["enchufe",30],["cuadro",1],["cable",80],["legalizacion",1],["jornada",10]]},
    {nombre:"Reforma",         lineas:[["puntoluz",10],["enchufe",12],["cuadro",1],["cable",40],["jornada",5]]},
    {nombre:"Avería / aviso",  lineas:[["desplazamiento",1],["hora",2]]}
  ]},
  {cat:"🏭 Nave industrial", subs:[
    {nombre:"Instalación nueva", lineas:[["cuadroind",1],["puntoluz",20],["cable",120],["legalizacion",1],["jornada",12]]},
    {nombre:"Reforma / ampliación", lineas:[["cuadroind",1],["cable",60],["jornada",6]]}
  ]},
  {cat:"🔌 Otros", subs:[
    {nombre:"Cargador coche eléctrico", lineas:[["cargador",1],["cable",15],["magneto",1],["diferencial",1],["legalizacion",1],["jornada",1]]}
  ]}
];
/* ================= ESTADO ================= */
let state = {
  config: {empresa:{nombre:"",nif:"",telefono:"",email:"",logo:""}, margen:28, iva:21, conIva:false, prefijo:"PV", prefijoParte:"PT",
           condiciones:"Presupuesto válido 30 días. No incluye trabajos no especificados."},
  precios: preciosReferencia(),
  presupuestos: [],
  partes: [],
  clientes: [],
  diario: []
};
let vista = "nota", editando = null, filtro = "", cambiosSinGuardar = false, textoNota = "", modoPartes = "diario";

const $ = s => document.querySelector(s);
const uid = () => "id" + Math.random().toString(36).slice(2,10) + Date.now().toString(36);
const eur = n => (isNaN(n)?0:n).toLocaleString("es-ES",{style:"currency",currency:"EUR"});
const esc = s => String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const hoy = () => new Date().toISOString().slice(0,10);
const fFecha = f => { if(!f) return ""; const [a,m,d]=f.split("-"); return `${d}/${m}/${a}`; };
function marcarCambio(){ cambiosSinGuardar = true; }
window.addEventListener("beforeunload", e => {
  if (cambiosSinGuardar && state.presupuestos.length){ e.preventDefault(); e.returnValue = ""; }
});
function precioDe(k){ return state.precios.find(p => p.k === k); }
function siguienteNumero(tipo){
  const anio = new Date().getFullYear();
  const pref = tipo === "parte" ? (state.config.prefijoParte || "PT") : state.config.prefijo;
  const lista = tipo === "parte" ? (state.partes || []) : state.presupuestos;
  const re = new RegExp(`^${pref}-${anio}-(\\d+)$`);
  let max = 0;

  return `${pref}-${anio}-${String(max+1).padStart(3,"0")}`;
}

/* ================= ANALIZADOR DE NOTAS ================= */
const NUM_PAL = {un:1,uno:1,una:1,dos:2,tres:3,cuatro:4,cinco:5,seis:6,siete:7,ocho:8,nueve:9,diez:10,once:11,doce:12,trece:13,catorce:14,quince:15,dieciseis:16,veinte:20,veinticinco:25,treinta:30,cuarenta:40,cincuenta:50,sesenta:60,ochenta:80,cien:100};
function normalizar(t){ return t.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,""); }
function aNum(s){
  if (s == null) return null;
  const n = parseFloat(String(s).replace(",","."));
  if (!isNaN(n)) return n;
  return NUM_PAL[normalizar(String(s)).trim()] ?? null;
}
const PAT_NUM = "(\\d+[.,]?\\d*|un|uno|una|dos|tres|cuatro|cinco|seis|siete|ocho|nueve|diez|once|doce|trece|catorce|quince|dieciseis|veinte|veinticinco|treinta|cuarenta|cincuenta|sesenta|ochenta|cien)";
function analizar(texto){
  const t = " " + normalizar(texto) + " ";
  const lineas = [];
  const usado = new Set();
  const M = 1 + state.config.margen/100;
  const add = (k, cant, nombreExtra) => {
    const it = precioDe(k);
    if (!it || usado.has(k)) return;
    usado.add(k);
    lineas.push({concepto: nombreExtra || it.nombre, cant: Math.max(cant||1, 0.5), unidad: it.unidad, precio: it.precio, esMO: !!it.esMO});
  };
  let m;
  // Paneles / placas / módulos (con potencia opcional "de 550")
  m = t.match(new RegExp(PAT_NUM + "\\s*(?:paneles?|placas?|modulos?)(?:\\s+(?:de\\s+)?(\\d{3})\\s*w?)?"));
  if (m){
    const n = aNum(m[1]) || 1;
    add("panel", n, m[2] ? `Módulo FV ${m[2]} W mono` : null);
    add("estructura", n);            // estructura para los mismos paneles
  } else if (/paneles?|placas?|autoconsumo|fotovoltaic/.test(t) && /autoconsumo|fotovoltaic/.test(t)) {
    // autoconsumo sin nº de paneles: estimar por kW (≈ nº kW * 2 paneles de 550)
    const kw = t.match(new RegExp("autoconsumo\\s+(?:de\\s+)?" + PAT_NUM + "\\s*k"));
    if (kw){ const n = Math.round((aNum(kw[1])||3)*2); add("panel", n); add("estructura", n); }
  }
  // Inversor (elige por kW)
  if (/inversor/.test(t)){
    let kw = null;
    m = t.match(new RegExp("inversor[^.]{0,30}?" + PAT_NUM + "\\s*k")) || t.match(new RegExp(PAT_NUM + "\\s*k[wv]a?[^.]{0,25}?inversor")) || t.match(new RegExp("(?:autoconsumo|instalacion)\\s+(?:de\\s+)?" + PAT_NUM + "\\s*k"));
    if (m) kw = aNum(m[1]);
    const k = kw == null ? "inv5" : (kw <= 3.5 ? "inv3" : kw <= 5.5 ? "inv5" : kw <= 8 ? "inv6" : "inv10");
    add(k, 1);
  }
  // Batería
  if (/bater/.test(t)){
    m = t.match(new RegExp("bater\\w*[^.]{0,20}?" + PAT_NUM + "\\s*kwh?"));
    add("bateria", 1, m ? `Batería litio ${aNum(m[1])} kWh` : null);
  }
  // Metros de cable / tirada / manguera / línea
  m = t.match(new RegExp(PAT_NUM + "\\s*(?:metros?|mts?|m)\\b(?:\\s*de)?\\s*(?:cable|manguera|tirada|linea|canalizacion)?")) ||
      t.match(new RegExp("tirada\\s+(?:de\\s+)?(?:unos\\s+)?" + PAT_NUM));
  if (m && /cable|manguera|tirada|linea|canalizacion|metros?/.test(t)) add("cable", aNum(m[1]));
  // Cuadro
  if (/cuadro/.test(t)) add("cuadro", 1);
  // Magnetotérmicos y diferenciales
  m = t.match(new RegExp(PAT_NUM + "\\s*magnetot"));
  if (m || /magnetot|automatico/.test(t)) add("magneto", m ? aNum(m[1]) : 1);
  m = t.match(new RegExp(PAT_NUM + "\\s*diferencial"));
  if (m || /diferencial/.test(t)) add("diferencial", m ? aNum(m[1]) : 1);
  // Bombeo solar
  if (/bombeo|bomba\b/.test(t)) add("bomba", 1);
  // Legalización
  if (/legalizaci|boletin|tramitaci|memoria tecnica/.test(t)) add("legalizacion", 1);
  // Aviso / avería / desplazamiento
  if (/averia|aviso|desplazamiento/.test(t)) add("desplazamiento", 1);
  // Bomba sumergida / grupo de presión / variador
  if (/sumergid/.test(t)) add("bombasum", 1);
  if (/grupo de presion|bomba de presion/.test(t)) add("bombapres", 1);
  if (/variador/.test(t)) add("variador", 1);
  // Puntos de luz y enchufes
  m = t.match(new RegExp(PAT_NUM + "\\s*puntos? de luz"));
  if (m) add("puntoluz", aNum(m[1]));
  m = t.match(new RegExp(PAT_NUM + "\\s*(?:enchufes?|tomas?(?: de corriente)?)"));
  if (m) add("enchufe", aNum(m[1]));
  // Cargador coche eléctrico
  if (/cargador|wallbox|punto de recarga/.test(t)) add("cargador", 1);
  // Cuadro industrial si se habla de nave/trifásica
  if (/cuadro/.test(t) && /nave|industrial|trifasic/.test(t)){ usado.delete("cuadro"); const i = lineas.findIndex(l=>l.concepto.includes("Cuadro nuevo")); if(i>=0) lineas.splice(i,1); add("cuadroind", 1); }
  // Mano de obra: "2 operarios ... 2 jornadas" | "N jornadas" | "N horas"
  m = t.match(new RegExp(PAT_NUM + "\\s*op\\w*[^.]{0,30}?" + PAT_NUM + "\\s*(?:jornadas?|dias?)"));
  if (m){
    const ops = aNum(m[1])||1, jor = aNum(m[2])||1;
    add("jornada", ops*jor, `Mano de obra (${ops} op. × ${jor} jornada${jor>1?"s":""})`);
  } else {
    m = t.match(new RegExp(PAT_NUM + "\\s*(?:jornadas?|dias? de trabajo)"));
    if (m) add("jornada", aNum(m[1]));
    else {
      m = t.match(new RegExp(PAT_NUM + "\\s*horas?"));
      if (m) add("hora", aNum(m[1]));
    }
  }
  return lineas;
}

function capitalizar(s){ return String(s||"").trim().split(/\s+/).map(w => w ? w[0].toUpperCase()+w.slice(1) : w).join(" "); }

/* ================= DIARIO POR VOZ ================= */
const hhmm = min => String(Math.floor(min/60)%24).padStart(2,"0") + ":" + String(min%60).padStart(2,"0");
function extraerCliente(desc){
  const d = " " + desc + " ";
  const limpiar = s => s.split(/\s+(?:a\s+por|para|que|donde|y\s+(?:luego|despues|ahora)|con\s+el|con\s+la)\s+/i)[0].replace(/\s+/g," ").trim();
  let m = d.match(/(?:casa|almac[eé]n|obra|nave|finca|taller|tienda|bar|restaurante|cortijo|chalet|cooperativa)\s+(?:de\s+)?[^,.;]{3,45}/i);
  if (m) return limpiar(m[0]);
  m = d.match(/\b(?:en|para|donde)\s+(?:el\s+|la\s+|los\s+|las\s+)?([^,.;]{3,45})/i);
  if (m) return limpiar(m[1]);
  return "";
}
function analizarDia(texto){
  const re = /(?:desde|de)\s+(?:las?\s+)?(\d{1,2})(?:[:.h](\d{2}))?\s*(?:h(?:oras)?\b)?\s*(?:hasta|a)\s+(?:las?\s+)?(\d{1,2})(?:[:.h](\d{2}))?/gi;
  const marcas = []; let m;
  while ((m = re.exec(texto))) marcas.push({i: m.index, fin: m.index + m[0].length, h1: +m[1], m1: +(m[2]||0), h2: +m[3], m2: +(m[4]||0)});
  return marcas.map((mk, idx) => {
    const hastaTxt = idx+1 < marcas.length ? marcas[idx+1].i : texto.length;
    const desc = texto.slice(mk.fin, hastaTxt).replace(/^[\s,.:;yY]+|[\s,.:;y]+$/g, "").trim();
    const d1 = mk.h1*60 + mk.m1;
    let d2 = mk.h2*60 + mk.m2;
    if (d2 <= d1) d2 += 12*60;                       // «de 10 a 2» → 10:00-14:00
    return {desde: hhmm(d1), hasta: hhmm(d2), horas: Math.round((d2-d1)/6)/10, texto: desc, nombreCliente: extraerCliente(desc)};
  }).filter(e => e.texto);
}
function registrarDia(){
  const txt = ($("#texto-nota") ? $("#texto-nota").value : textoNota).trim();
  if (!txt){ alert("Cuéntame tu día con horarios, por ejemplo: «De 6:00 a 9:00 arreglando un motor en almacén de ajos Manuel Pérez, de 9 a 10 en el almacén eléctrico…»"); return; }
  const entradas = analizarDia(txt);
  if (!entradas.length){ alert("No he encontrado tramos horarios. Usa el formato «de las 6:00 hasta las 9:00 …, de 9 a 10 …» y vuelve a intentarlo."); return; }
  const fecha = hoy();
  let nuevos = [];
  entradas.forEach(e => {
    let clienteId = "";
    if (e.nombreCliente){
      const r = obtenerOCrearCliente(e.nombreCliente);
      clienteId = r.cliente.id;
      if (r.nuevo) nuevos.push(r.cliente.nombre);

function ventaLinea(l, margen){
  const base = (+l.cant||0) * (+l.precio||0);
  return l.esMO ? base : base * (1 + (+margen||0)/100);
}
function totales(p){
  const coste = (p.lineas||[]).reduce((s,l) => s + (+l.cant||0)*(+l.precio||0), 0);
  const venta = (p.lineas||[]).reduce((s,l) => s + ventaLinea(l, p.margen), 0);
  const iva = p.conIva ? venta * (+p.iva||0)/100 : 0;
  return {coste, venta, iva, total: venta + iva, beneficio: venta - coste};
}

let rec = null, grabando = false;
function toggleGrabacion(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR){ alert("Este navegador no soporta dictado. Abre PresuVolt en Chrome (Android) y funcionará. También puedes escribir la nota o usar el micrófono del teclado."); return; }
  if (grabando){ try{ rec.stop(); }catch(e){} return; }
  rec = new SR();
  rec.lang = "es-ES"; rec.continuous = true; rec.interimResults = false;
  rec.onresult = ev => {
    let txt = "";
    for (let i = ev.resultIndex; i < ev.results.length; i++)
      if (ev.results[i].isFinal) txt += ev.results[i][0].transcript;
    txt = txt.trim();
    if (txt){
      textoNota = textoNota ? textoNota.replace(/\s+$/,"") + " " + txt : txt.charAt(0).toUpperCase()+txt.slice(1);
      const ta = $("#texto-nota"); if (ta) ta.value = textoNota;
    }
  };
  rec.onend = () => { grabando = false; pintarVoz(); };
  rec.onerror = ev => { grabando = false; pintarVoz(); if (ev.error === "not-allowed") alert("No hay permiso de micrófono. Actívalo en el navegador."); };
  try { rec.start(); grabando = true; } catch(e){ grabando = false; }
  pintarVoz();
}
function pintarVoz(){
  const b = $("#btn-voz"), e = $("#estado-voz");
  if (b){ b.classList.toggle("grabando", grabando); b.textContent = grabando ? "⏹️" : "🎤"; }
  if (e) e.textContent = grabando ? "Grabando… pulsa para parar" : "Pulsa para hablar";
}

  const c = $("#lienzo-firma"), ctx = c.getContext("2d");
  ctx.fillStyle = "#fff"; ctx.fillRect(0,0,c.width,c.height);
  ctx.strokeStyle = "#1A1C1E"; ctx.lineWidth = 2.2; ctx.lineCap = "round"; ctx.lineJoin = "round";
  let ux = 0, uy = 0;
  const pos = e => { const r = c.getBoundingClientRect(); return [(e.clientX-r.left)*c.width/r.width,(e.clientY-r.top)*c.height/r.height]; };
  c.onpointerdown = e => { e.preventDefault(); firmaDibujando = true; [ux,uy] = pos(e); c.setPointerCapture(e.pointerId); };
  c.onpointermove = e => { if(!firmaDibujando) return; const [x,y] = pos(e); ctx.beginPath(); ctx.moveTo(ux,uy); ctx.lineTo(x,y); ctx.stroke(); ux = x; uy = y; };
  c.onpointerup = c.onpointercancel = () => { firmaDibujando = false; };
}
function limpiarFirma(){ const c = $("#lienzo-firma"), ctx = c.getContext("2d"); ctx.fillStyle = "#fff"; ctx.fillRect(0,0,c.width,c.height); }
function guardarFirma(){ editando.firma = $("#lienzo-firma").toDataURL("image/png"); marcarCambio(); cerrarModal(); render(); }
/* ================= PDF / WHATSAPP ================= */
function docHtml(p){
  const e = state.config.empresa, t = totales(p);
  const lin = (p.lineas||[]).filter(l=>l.concepto).map(l =>
    `<div class="l"><span class="c">${l.cant && +l.cant !== 1 ? esc(l.cant)+ (l.unidad==="m"?" m ":"× ") : ""}${esc(l.concepto)}</span><span class="i">${eur(ventaLinea(l,p.margen))}</span></div>`).join("");
  return `<div class="doc"><div class="doc-cinta"></div>
    <div class="doc-cab">
      <div style="display:flex;gap:14px;align-items:flex-start">
        ${e.logo?`<img src="${e.logo}">`:""}
        <div class="emp"><strong>${esc(e.nombre||"Tu empresa")}</strong><br>
          ${e.nif?"NIF: "+esc(e.nif)+"<br>":""}${esc(e.telefono||"")}${e.telefono&&e.email?" · ":""}${esc(e.email||"")}</div></div>
      <div class="doc-tit"><h2>${p.tipo === "parte" ? "Parte de trabajo" : "Presupuesto"}</h2><div>Nº ${esc(p.numero)}</div><div>${fFecha(p.fecha)}</div></div>
    </div>
    ${p.cliente||p.obra?`<div class="doc-cliente"><strong>${esc(p.cliente||"")}</strong>${p.cliente&&p.obra?" · ":""}${esc(p.obra||"")}</div>`:""}
    <div class="doc-lineas"><div class="cab"><span>Concepto</span><span>Importe</span></div>${lin}</div>
    ${p.conIva?`<div class="doc-iva"><span>Base imponible</span><span>${eur(t.venta)}</span></div><div class="doc-iva"><span>IVA (${p.iva}%)</span><span>${eur(t.iva)}</span></div>`:""}
    <div class="doc-total"><span>TOTAL${p.conIva?"":" (IVA no incl.)"}</span><span>${eur(t.total)}</span></div>
    ${p.observaciones?`<div class="obs">${esc(p.observaciones)}</div>`:""}
    ${p.tipo === "parte" ? `<div class="doc-firmas">
      <div><div class="hueco"></div><div class="linea">Firma del técnico</div></div>
      <div><div class="hueco">${p.firma?`<img src="${p.firma}">`:""}</div><div class="linea">Conforme del cliente</div></div>
    </div>` : ""}
    <div class="doc-pie">${esc(state.config.condiciones)}</div>
  </div>`;
}
function imprimir(id){
  const p = buscarDoc(id); if(!p) return;
  $("#zona-impresion").innerHTML = docHtml(p);
  setTimeout(()=>window.print(), 60);
}
function porWhatsApp(id){
  const p = buscarDoc(id); if(!p) return;
  const t = totales(p);
  const lin = (p.lineas||[]).filter(l=>l.concepto).map(l=>`• ${l.concepto}: ${eur(ventaLinea(l,p.margen))}`).join("\n");
  const txt = `Hola${p.cliente?" "+p.cliente:""}, te paso el ${p.tipo==="parte"?"parte de trabajo":"presupuesto"} ${p.numero}${p.obra?" ("+p.obra+")":""}:\n${lin}\nTOTAL: ${eur(t.total)}${p.conIva?" (IVA incluido)":" (IVA no incluido)"}`;
  let d = String(p.telefono||"").replace(/\D/g,"");
  if (d.length === 9) d = "34" + d;
  window.open((d?`https://wa.me/${d}`:"https://wa.me/") + "?text=" + encodeURIComponent(txt), "_blank");
}
/* ================= COPIA DE SEGURIDAD ================= */
function exportarDatos(){
  const blob = new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "presuvolt-datos-" + hoy() + ".json";
  a.click(); URL.revokeObjectURL(a.href);
  cambiosSinGuardar = false;
}
function importarDatos(ev){
  const f = ev.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = () => {
    try{
      const d = JSON.parse(r.result);
      if (!d.config || !Array.isArray(d.precios)) throw new Error("formato");
      if (!Array.isArray(d.partes)) d.partes = [];
      if (!Array.isArray(d.clientes)) d.clientes = [];
      if (!Array.isArray(d.diario)) d.diario = [];
      if (!d.config.prefijoParte) d.config.prefijoParte = "PT";
      state = d; cambiosSinGuardar = false; editando = null;
      render();
    } catch { alert("El archivo no es una copia de PresuVolt válida."); }
  };
  r.readAsText(f); ev.target.value = "";
}
render();
/* ================= PWA ================= */
if ("serviceWorker" in navigator && (location.protocol === "https:" || location.hostname === "localhost")) {
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
