<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PresuVolt — Presupuestos por nota de voz</title>
<meta name="color-scheme" content="only light">
<meta name="theme-color" content="#1A1C1E">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    color-scheme: only light;
    --grafito:#1A1C1E; --papel:#FBFBF9; --amarillo:#F5C400; --wa:#1FAF54;
    --linea:#DDDDD6; --gris:#5B5E63; --rojo:#B91C1C; --verde:#15803d;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Barlow',-apple-system,sans-serif;background:var(--papel);color:var(--grafito);font-size:16px;line-height:1.5}
  .cinta{background:repeating-linear-gradient(-45deg,var(--amarillo) 0 14px,var(--grafito) 14px 28px);height:7px}
  header{background:var(--grafito);color:var(--papel);padding:0 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .logo{font-family:'Barlow Semi Condensed',sans-serif;font-weight:800;font-size:1.25rem;letter-spacing:.5px;text-transform:uppercase;padding:13px 0}
  .logo span{background:var(--amarillo);color:var(--grafito);padding:0 5px}
  nav.sup{display:flex;gap:2px}
  nav.sup button{background:transparent;border:none;color:#9a9da1;padding:16px 13px;font-size:.92rem;cursor:pointer;border-bottom:3px solid transparent;font-family:'Barlow Semi Condensed',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
  nav.sup button:hover{color:#fff}
  nav.sup button.activo{color:var(--amarillo);border-bottom-color:var(--amarillo)}
  .hdr-der{margin-left:auto;display:flex;gap:8px;padding:8px 0}
  main{max-width:1000px;margin:0 auto;padding:22px 18px 60px}
  .tarjeta{background:#fff;border:1.5px solid var(--linea);border-radius:12px;padding:20px;margin-bottom:16px}
  h2{font-family:'Barlow Semi Condensed',sans-serif;font-weight:800;font-size:1.35rem;text-transform:uppercase;letter-spacing:-.2px}
  h3.sub{font-family:'Barlow Semi Condensed',sans-serif;font-weight:700;font-size:1.02rem;text-transform:uppercase;margin:18px 0 10px}
  .fila-titulo{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:'Barlow Semi Condensed',sans-serif;font-weight:700;font-size:.98rem;text-transform:uppercase;letter-spacing:.5px;padding:12px 20px;border-radius:6px;border:2px solid var(--grafito);cursor:pointer;background:var(--grafito);color:var(--amarillo);text-decoration:none}
  .btn:active{transform:scale(.97)}
  .btn.amarillo{background:var(--amarillo);color:var(--grafito);border-color:var(--amarillo)}
  .btn.sec{background:#fff;color:var(--grafito)}
  .btn.wa{background:var(--wa);border-color:var(--wa);color:#fff}
  .btn.peligro{background:#fff;color:var(--rojo);border-color:#fca5a5}
  .btn.mini{padding:8px 13px;font-size:.85rem}
  .btn-icono{background:none;border:none;cursor:pointer;font-size:17px;padding:6px 8px;border-radius:6px;color:var(--gris)}
  .btn-icono:hover{background:#f1f0ec;color:var(--grafito)}
  label{display:block;font-family:'Barlow Semi Condensed',sans-serif;font-weight:600;font-size:.8rem;text-transform:uppercase;letter-spacing:.8px;color:var(--gris);margin-bottom:4px}
  input,select,textarea{width:100%;padding:10px 12px;border:1.5px solid #c9c9c2;border-radius:6px;font-size:16px;font-family:'Barlow',sans-serif;background:#fff;color:var(--grafito)}
  input:focus,select:focus,textarea:focus{outline:2.5px solid var(--amarillo);border-color:var(--grafito)}
  textarea{resize:vertical}
  .rejilla{display:grid;gap:14px}
  .c2{grid-template-columns:1fr 1fr}
  .c3{grid-template-columns:1fr 1fr 1fr}
  @media(max-width:640px){.c2,.c3{grid-template-columns:1fr}}
  .aviso{background:#FFF8DC;border:1.5px solid var(--amarillo);border-radius:8px;padding:10px 14px;font-size:.85rem;margin-bottom:16px}
  .chip{display:inline-block;padding:3px 10px;border-radius:99px;font-family:'IBM Plex Mono',monospace;font-size:.7rem;font-weight:600;text-transform:uppercase;white-space:nowrap}
  .chip.ref{background:#f1f0ec;color:var(--gris)}
  .chip.mio{background:#FFF3B8;color:#7a6200;border:1px solid var(--amarillo)}
  .chip.borrador{background:#f1f0ec;color:var(--gris)}
  .chip.enviado{background:#e5f0ff;color:#1d4ed8}
  .chip.aceptado{background:#eafaf0;color:var(--verde)}
  .chip.pendiente{background:#FFF3B8;color:#7a6200;border:1px solid var(--amarillo)}
  .chip.facturado{background:#eafaf0;color:var(--verde)}
  .firma-mini{max-height:70px;border:1.5px solid var(--linea);border-radius:6px;background:#fff;padding:4px}
  .dia-entrada{display:grid;grid-template-columns:56px 1fr auto;gap:12px;align-items:center;border:1.5px solid var(--linea);border-radius:10px;padding:10px 12px;margin-bottom:8px;cursor:pointer;background:#fff}
  .dia-entrada:hover{border-color:var(--amarillo);background:#FFFDF2}
  .dia-hora{display:flex;flex-direction:column;align-items:center;font-family:'IBM Plex Mono',monospace;font-size:.78rem;font-weight:600;background:var(--grafito);color:var(--amarillo);border-radius:8px;padding:6px 4px}
  .dia-flecha{color:#9a9da1;font-size:.7rem;line-height:1}
  .dia-txt{font-size:.95rem;line-height:1.35}
  .dia-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px}
  .dia-acciones{display:flex;flex-direction:column;gap:2px}
  .kpis-mes{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
  .kpis-mes>div{background:var(--grafito);color:var(--papel);border-radius:10px;padding:10px 8px;text-align:center;display:flex;flex-direction:column;gap:1px}
  .kpis-mes .v{font-family:'Barlow Semi Condensed';font-weight:800;font-size:1.02rem;color:var(--amarillo)}
  .kpis-mes .l{font-size:.6rem;text-transform:uppercase;letter-spacing:.4px;color:#9a9da1;font-weight:600}
  .badge{position:absolute;top:4px;right:2px;background:#dc2626;color:#fff;border-radius:99px;font-size:.62rem;font-weight:700;min-width:17px;height:17px;display:flex;align-items:center;justify-content:center;padding:0 4px;font-family:'Barlow',sans-serif}
  /* ---- pantalla nota de voz ---- */
  .nota-hero{text-align:center;padding:8px 0 4px}
  .nota-hero p.guia{color:var(--gris);max-width:52ch;margin:0 auto 18px;font-size:.98rem}
  .btn-voz{width:120px;height:120px;border-radius:50%;border:4px solid var(--grafito);background:var(--amarillo);font-size:44px;cursor:pointer;box-shadow:0 8px 22px rgba(26,28,30,.22);transition:transform .1s}
  .btn-voz:active{transform:scale(.94)}
  .btn-voz.grabando{background:#dc2626;border-color:#dc2626;animation:pulso 1.1s infinite}
  @keyframes pulso{0%{box-shadow:0 0 0 0 rgba(220,38,38,.45)}70%{box-shadow:0 0 0 20px rgba(220,38,38,0)}100%{box-shadow:0 0 0 0 rgba(220,38,38,0)}}
  .estado-voz{font-family:'IBM Plex Mono',monospace;font-size:.8rem;text-transform:uppercase;letter-spacing:1px;color:var(--gris);margin-top:10px}
  #texto-nota{min-height:110px;margin-top:16px;font-size:16px}
  .ejemplo{font-size:.85rem;color:var(--gris);font-style:italic;margin-top:10px}
  /* ---- editor ---- */
  .linea-item{display:grid;grid-template-columns:1fr 74px 92px 96px 34px;gap:8px;align-items:center;margin-bottom:8px}
  .cab-lineas{display:grid;grid-template-columns:1fr 74px 92px 96px 34px;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:.62rem;font-weight:600;color:var(--gris);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
  .li-campo{display:flex;flex-direction:column;min-width:0}
  .li-campo em{display:none;font-style:normal;font-family:'IBM Plex Mono',monospace;font-size:.56rem;font-weight:600;color:var(--gris);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
  .li-campo input{width:100%}
  @media(max-width:640px){
    .cab-lineas{display:none}
    .linea-item{grid-template-columns:1fr 1fr 1.2fr 34px;grid-template-areas:"con con con x" "cant coste venta venta";gap:6px 8px;border:1.5px solid var(--linea);border-radius:10px;padding:9px;background:#fff}
    .linea-item>input:first-child{grid-area:con;font-weight:600}
    .li-cant{grid-area:cant}
    .li-coste{grid-area:coste}
    .li-venta{grid-area:venta}
    .linea-item .btn-icono{grid-area:x;align-self:start}
    .li-campo em{display:block}
  }
  .linea-item input{padding:8px 8px;font-size:15px}
  .venta{font-family:'IBM Plex Mono',monospace;text-align:right;background:#f6f5f0!important}
  .caja-totales{background:#f6f5f0;border:1.5px solid var(--linea);border-radius:8px;padding:14px 18px;margin-top:14px;max-width:360px;margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:.92rem}
  .caja-totales .fila{display:flex;justify-content:space-between;padding:3px 0;gap:12px}
  .caja-totales .fila.privado{color:var(--gris);font-size:.8rem}
  .caja-totales .fila.total{font-weight:600;font-size:1.05rem;background:var(--amarillo);margin:8px -8px -4px;padding:9px 10px;border-radius:4px}
  .nota-privada{font-size:.78rem;color:var(--gris);text-align:right;margin-top:6px}
  /* ---- listas ---- */
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-family:'IBM Plex Mono',monospace;font-size:.68rem;text-transform:uppercase;letter-spacing:.5px;color:var(--gris);padding:8px 10px;border-bottom:2px solid var(--grafito);font-weight:600}
  td{padding:10px;border-bottom:1px dashed var(--linea);vertical-align:middle;font-size:.95rem}
  tr.clicable{cursor:pointer}
  tr.clicable:hover{background:#f6f5f0}
  .num{text-align:right;font-variant-numeric:tabular-nums;font-family:'IBM Plex Mono',monospace;font-size:.88rem}
  .vacio{text-align:center;color:var(--gris);padding:38px 16px}
  .lista-movil{display:none}
  .tarjeta-item{border:1.5px solid var(--linea);border-radius:12px;padding:12px 14px;margin-bottom:10px;background:#fff}
  .ti-cab{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .ti-cli{font-weight:600;font-size:1rem;margin-top:2px}
  .ti-sub{font-size:.82rem;color:var(--gris)}
  .ti-pie{display:flex;justify-content:space-between;align-items:center;margin-top:8px;gap:8px}
  .ti-total{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:1.05rem}
  .buscador{max-width:260px}
  .pie-form{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap}
  .sep{height:1.5px;background:var(--linea);margin:18px 0}
  .logo-prev{max-height:56px;max-width:170px;border:1.5px solid var(--linea);border-radius:6px;padding:4px;background:#fff}
  /* ---- precios ---- */
  .precio-fila{display:grid;grid-template-columns:1fr 56px 92px 70px 88px 32px;gap:7px;align-items:center;margin-bottom:8px}
  @media(max-width:640px){.precio-fila{grid-template-columns:1fr 42px 74px 56px 68px 28px}.precio-fila .chip{font-size:.58rem;padding:3px 5px}}
  .precio-fila input{padding:8px;font-size:15px}
  /* ---- nav inferior móvil ---- */
  #nav-movil{display:none;position:fixed;left:0;right:0;bottom:0;background:var(--grafito);z-index:60;justify-content:space-around;padding:5px 4px calc(5px + env(safe-area-inset-bottom))}
  #nav-movil button{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:1px;font-family:'Barlow Semi Condensed',sans-serif;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:#9a9da1;padding:5px 5px;border-radius:10px;cursor:pointer}
  #nav-movil button.activo{color:var(--amarillo)}
  #nav-movil button .ico{font-size:21px;line-height:1.2}
  @media(max-width:640px){
    nav.sup{display:none}
    #nav-movil{display:flex}
    main{padding:14px 12px 96px}
    .btn{padding:13px 18px}
    .pie-form .btn{flex:1}
    .buscador{max-width:100%;flex:1}
    .fila-titulo>div{width:100%}
    .tabla-escritorio{display:none}
    .lista-movil{display:block}
    .caja-totales{max-width:100%}
    .hdr-der{margin-left:auto}
  }
  /* ---- impresión ---- */
  #zona-impresion{display:none}
  @media print{
    body>.cinta,body>header,body>main,#nav-movil,#modal{display:none!important}
    body{background:#fff}
    #zona-impresion{display:block;color:#000}
  }
  .doc{max-width:760px;margin:0 auto;padding:6px;font-family:'Barlow',sans-serif;color:#22252a;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .doc-card{background:#faf9f6;border:1px solid #eceae3;border-radius:14px;padding:16px 20px;margin-bottom:12px;break-inside:avoid;page-break-inside:avoid}
  .doc-card.amarilla{background:#FFF6CE;border-color:#f2df9a}
  .doc-cab{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:14px}
  .doc-cab .emp{display:flex;gap:16px;align-items:center;font-size:12px;color:#5d6167;line-height:1.55}
  .doc-cab .emp img{max-height:58px;max-width:170px;border-radius:8px}
  .doc-cab .emp strong{display:block;font-family:'Barlow Semi Condensed',sans-serif;font-size:17.5px;color:#22252a;text-transform:uppercase;letter-spacing:.3px}
  .doc-tit{text-align:right}
  .doc-tit h2{font-family:'Barlow Semi Condensed',sans-serif;font-weight:800;font-size:23px;text-transform:uppercase;letter-spacing:1px}
  .doc-tit .num{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#5d6167;margin-top:2px}
  .doc-fila{display:flex;gap:12px;flex-wrap:wrap}
  .doc-fila .doc-card{flex:1;min-width:150px}
  .doc-etq{font-family:'Barlow Semi Condensed',sans-serif;font-size:9.5px;letter-spacing:1.4px;text-transform:uppercase;color:#a0a4aa;margin-bottom:3px}
  .doc-card.amarilla .doc-etq{color:#8a7a33}
  .doc-val{font-size:13.5px;font-weight:600}
  .doc-tabla{width:100%;border-collapse:collapse;font-size:12.5px}
  .doc-tabla th{font-family:'Barlow Semi Condensed',sans-serif;font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:#a0a4aa;text-align:left;padding:2px 10px 8px;font-weight:700}
  .doc-tabla th.n{text-align:right}
  .doc-tabla td{padding:9px 10px;line-height:1.45}
  .doc-tabla tr:nth-child(odd) td{background:#fff}
  .doc-tabla tr:nth-child(odd) td:first-child{border-radius:8px 0 0 8px}
  .doc-tabla tr:nth-child(odd) td:last-child{border-radius:0 8px 8px 0}
  .doc-tabla td.n{text-align:right;font-family:'IBM Plex Mono',monospace;font-size:11.5px;white-space:nowrap;color:#44484e}
  .doc-totalcard{display:flex;justify-content:space-between;align-items:center;gap:14px;background:#FFEF9E;border-color:#eed77a}
  .doc-totalcard .t1{font-family:'Barlow Semi Condensed',sans-serif;font-size:12.5px;letter-spacing:1.6px;text-transform:uppercase;color:#6b5600}
  .doc-totalcard .t2{font-size:10.5px;color:#8a7a33;margin-top:2px}
  .doc-totalcard .imp{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:27px;color:#22252a;white-space:nowrap}
  .doc-minis{display:flex;gap:12px;flex-wrap:wrap}
  .doc-minis .doc-card{flex:1;min-width:140px;text-align:center;padding:12px 8px}
  .doc-minis span{font-size:10.5px;color:#7c8087}
  .doc-minis b{display:block;font-size:12.5px;margin-top:2px}
  .doc-fotos{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:8px}
  .doc-fotos img{width:100%;height:106px;object-fit:cover;border-radius:8px;border:1px solid #e4e1d6}
  .doc .obs{font-size:11.5px;color:#44484e;white-space:pre-wrap;line-height:1.6;margin-top:4px}
  .doc-cta{display:flex;gap:22px;align-items:center;flex-wrap:wrap;background:#f3f1ea;border-color:#e4e1d6}
  .doc-cta .txt{flex:1.4;min-width:220px;font-size:11.8px;line-height:1.6;color:#44484e}
  .doc-cta .txt b{color:#22252a}
  .doc-cta .titcta{font-family:'Barlow Semi Condensed',sans-serif;text-transform:uppercase;font-size:12.5px;letter-spacing:1.2px;color:#22252a;display:block;margin-bottom:3px}
  .doc-firmabox{flex:1;min-width:180px;background:#fff;border:1px dashed #c9c9c2;border-radius:10px;height:84px;position:relative}
  .doc-firmabox img{position:absolute;inset:4px auto 16px 4px;max-height:60px;max-width:calc(100% - 8px)}
  .doc-firmabox span{position:absolute;bottom:5px;left:0;right:0;text-align:center;font-size:8.5px;color:#a0a4aa;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.5px}
  @media screen and (max-width:620px){
    .doc{padding:2px}
    .doc-card{padding:13px 14px}
    .doc-tabla thead{display:none}
    .doc-tabla tr{display:block;padding:9px 2px;border-bottom:1px solid #eceae3}
    .doc-tabla tbody tr:last-child{border-bottom:none}
    .doc-tabla td{display:inline-block;padding:2px 14px 2px 0;background:none!important;border-radius:0!important;border-bottom:none!important}
    .doc-tabla td:first-child{display:block;font-weight:600;padding:0 0 4px;font-size:13px;line-height:1.4}
    .doc-tabla td.n{font-size:11.5px;color:#44484e}
    .doc-tabla td.n::before{content:attr(data-etq) "  ";font-family:'Barlow Semi Condensed',sans-serif;font-size:9px;letter-spacing:.8px;text-transform:uppercase;color:#a0a4aa}
    .doc-totalcard .imp{font-size:22px}
    .doc-cta{flex-direction:column;align-items:stretch}
  }
  .doc-sellos{display:flex;justify-content:center;gap:14px 30px;flex-wrap:wrap;font-family:'Barlow Semi Condensed',sans-serif;font-size:10px;letter-spacing:1.3px;text-transform:uppercase;color:#7c8087;margin:6px 0 10px}
  .doc-sellos span::before{content:"✓ ";color:#c79a00}
  .doc-pie{font-size:9.5px;color:#b3b7bc;text-align:center;margin-top:4px;line-height:1.5}
</style>
</head>
<body>
<div class="cinta"></div>
<header>
  <span id="logo-emp" style="display:flex;align-items:center"></span>
  <div class="logo">Presu<span>Volt</span></div>
  <nav class="sup" id="nav"></nav>
  <div class="hdr-der">
    <button class="btn sec mini" id="chip-sync" style="display:none" onclick="irA('ajustes')" title="Estado de la sincronización en equipo"></button>
    <button class="btn sec mini" onclick="exportarDatos()">💾 Copia</button>
    <button class="btn sec mini" onclick="document.getElementById('importar').click()">📂 Cargar</button>
    <input type="file" id="importar" accept=".json" style="display:none" onchange="importarDatos(event)">
  </div>
</header>
<main id="app"></main>
<div id="zona-impresion"></div>
<nav id="nav-movil"></nav>
<div id="modal"></div>
<script>
"use strict";
const VERSION_APP = "v25";
/* ================= BASE DE PRECIOS DE REFERENCIA (por familias) ================= */
function preciosReferencia(){
  const R = (k,nombre,unidad,precio,tiempo,fam,esMO) => ({k,nombre,unidad,precio,tiempo:tiempo||0,fam,ref:true,esMO:!!esMO});
  return [
  // ☀️ Fotovoltaica
  R("panel450","Módulo FV 450 W mono","ud",98,.5,"☀️ Fotovoltaica"),
  R("panel","Módulo FV 550 W mono","ud",124,.5,"☀️ Fotovoltaica"),
  R("panel600","Módulo FV 600 W bifacial","ud",158,.5,"☀️ Fotovoltaica"),
  R("inv3","Inversor híbrido 3 kW","ud",790,2,"☀️ Fotovoltaica"),
  R("inv5","Inversor híbrido 5 kW","ud",1150,2,"☀️ Fotovoltaica"),
  R("inv6","Inversor híbrido 6 kW","ud",1290,2,"☀️ Fotovoltaica"),
  R("inv10","Inversor híbrido 10 kW","ud",1980,3,"☀️ Fotovoltaica"),
  R("microinv","Microinversor 800 W","ud",210,.5,"☀️ Fotovoltaica"),
  R("bateria","Batería litio 5 kWh","ud",1600,1.5,"☀️ Fotovoltaica"),
  R("bateria10","Batería litio 10 kWh","ud",2900,2,"☀️ Fotovoltaica"),

const NUM_PAL = {un:1,uno:1,una:1,dos:2,tres:3,cuatro:4,cinco:5,seis:6,siete:7,ocho:8,nueve:9,diez:10,once:11,doce:12,trece:13,catorce:14,quince:15,dieciseis:16,veinte:20,veinticinco:25,treinta:30,cuarenta:40,cincuenta:50,sesenta:60,ochenta:80,cien:100};

const PAT_NUM = "(\\d+[.,]?\\d*|un|uno|una|dos|tres|cuatro|cinco|seis|siete|ocho|nueve|diez|once|doce|trece|catorce|quince|dieciseis|veinte|veinticinco|treinta|cuarenta|cincuenta|sesenta|ochenta|cien)";
function analizarReglas(texto, lineas, usado){
  const t = " " + normalizar(texto) + " ";
  const add = (k, cant, nombreExtra) => {
    const it = precioDe(k);
    if (!it || usado.has(k)) return;
    usado.add(k);
    lineas.push({concepto: nombreExtra || it.nombre, cant: Math.max(cant||1, 0.5), unidad: it.unidad, precio: it.precio, tiempo: it.tiempo||0, esMO: !!it.esMO});
  };
  let m;
  // Paneles / placas / módulos (con potencia opcional "de 550")
  m = t.match(new RegExp(PAT_NUM + "\\s*(?:paneles?|placas?|modulos?)(?:\\s+(?:de\\s+)?(\\d{3})\\s*w?)?"));
  if (m){
    const n = aNum(m[1]) || 1;
    add("panel", n, m[2] ? `Módulo FV ${m[2]} W mono` : null);
    add("estructura", n);            // estructura para los mismos paneles
  } else if (/paneles?|placas?|autoconsumo|fotovoltaic/.test(t) && /autoconsumo|fotovoltaic/.test(t)) {

    const kw = t.match(new RegExp("autoconsumo\\s+(?:de\\s+)?" + PAT_NUM + "\\s*k"));
    if (kw){ const n = Math.round((aNum(kw[1])||3)*2); add("panel", n); add("estructura", n); }
  }
  // Inversor (elige por kW)
  if (/inversor/.test(t)){
    let kw = null;
    m = t.match(new RegExp("inversor[^.]{0,30}?" + PAT_NUM + "\\s*k")) || t.match(new RegExp(PAT_NUM + "\\s*k[wv]a?[^.]{0,25}?inversor")) || t.match(new RegExp("(?:autoconsumo|instalacion)\\s+(?:de\\s+)?" + PAT_NUM + "\\s*k"));

    add(k, 1);
  }
  // Batería
  if (/bater/.test(t)){
    m = t.match(new RegExp("bater\\w*[^.]{0,20}?" + PAT_NUM + "\\s*kwh?"));
    add("bateria", 1, m ? `Batería litio ${aNum(m[1])} kWh` : null);
  }
  // Metros de cable / tirada / manguera / línea
  m = t.match(new RegExp(PAT_NUM + "\\s*(?:metros?|mts?|m)\\b(?:\\s*de)?\\s*(?:cable|manguera|tirada|linea|canalizacion)?")) ||
      t.match(new RegExp("tirada\\s+(?:de\\s+)?(?:unos\\s+)?" + PAT_NUM));
  if (m && /cable|manguera|tirada|linea|canalizacion|metros?/.test(t)) add("cable", aNum(m[1]));
  // Cuadro
  if (/cuadro/.test(t)) add("cuadro", 1);
  // Magnetotérmicos y diferenciales
  m = t.match(new RegExp(PAT_NUM + "\\s*magnetot"));
  if (m || /magnetot|automatico/.test(t)) add("magneto", m ? aNum(m[1]) : 1);
  m = t.match(new RegExp(PAT_NUM + "\\s*diferencial"));
  if (m || /diferencial/.test(t)) add("diferencial", m ? aNum(m[1]) : 1);
  // Bombeo solar
  if (/bombeo|bomba\b/.test(t)) add("bomba", 1);
  // Legalización
  if (/legalizaci|boletin|tramitaci|memoria tecnica/.test(t)) add("legalizacion", 1);
  // Aviso / avería / desplazamiento
  if (/averia|aviso|desplazamiento/.test(t)) add("desplazamiento", 1);
  // Bomba sumergida / grupo de presión / variador
  if (/sumergid/.test(t)) add("bombasum", 1);
  if (/grupo de presion|bomba de presion/.test(t)) add("bombapres", 1);
  if (/variador/.test(t)) add("variador", 1);
  // Puntos de luz y enchufes
  m = t.match(new RegExp(PAT_NUM + "\\s*puntos? de luz"));
  if (m) add("puntoluz", aNum(m[1]));
  m = t.match(new RegExp(PAT_NUM + "\\s*(?:enchufes?|tomas?(?: de corriente)?)"));
  if (m) add("enchufe", aNum(m[1]));
  // Cargador coche eléctrico
  if (/cargador|wallbox|punto de recarga/.test(t)) add("cargador", 1);
  // Cuadro industrial si se habla de nave/trifásica
  if (/cuadro/.test(t) && /nave|industrial|trifasic/.test(t)){ usado.delete("cuadro"); const i = lineas.findIndex(l=>l.concepto.includes("Cuadro nuevo")); if(i>=0) lineas.splice(i,1); add("cuadroind", 1); }
  // Mano de obra: "2 operarios ... 2 jornadas" | "N jornadas" | "N horas"
  m = t.match(new RegExp(PAT_NUM + "\\s*op\\w*[^.]{0,30}?" + PAT_NUM + "\\s*(?:jornadas?|dias?)"));
  if (m){

  } else {
    m = t.match(new RegExp(PAT_NUM + "\\s*(?:jornadas?|dias? de trabajo)"));
    if (m) add("jornada", aNum(m[1]));
    else {
      m = t.match(new RegExp(PAT_NUM + "\\s*horas?"));
      if (m) add("hora", aNum(m[1]));
    }
  }
  return lineas;
}
/* ===== Reconocimiento por segmentos contra TODA la base de precios (v2) =====

const STOP_SEG = new Set("de del la el lo los las un una unos unas y con para en a al por que tipo marca modelo cada mas e o u otro otra amperio amperios poner ponme pon instalar instalando instalacion colocar colocando cambiar sustituir montar quiero necesito falta llevar puesto puesta incluye incluido incluida nuevo nueva nuevos nuevas".split(" "));

const ATRIBUTO_PREVIO = new Set(["de","del","a","x","por","cada","seccion","tipo"]);
const SINONIMOS_SEG = {toma:"enchufe", schuko:"enchufe", clavija:"enchufe", foco:"downlight", halogeno:"downlight", empotrable:"empotrar", empotrado:"empotrar", empotrada:"empotrar", llave:"interruptor", apagador:"interruptor", automatico:"magnetotermico", pia:"magnetotermico", placa:"panel", pantalla:"regleta", fluorescente:"regleta", intemperie:"estanco", exterior:"estanco", television:"tv", tele:"tv", luce:"luz", vatio:"w", kilovatio:"kw", watio:"w", tirada:"cable", hilo:"linea", cablecillo:"linea", calentador:"termo"};
// Raíz común: quita la -s del plural y la vocal final («enchufes»→«enchuf», «enchufe»→«enchuf»,
// «interruptores»→«interruptor», «estanca/estanco»→«estanc»). Se aplica igual al dictado y a la base.
function raizSeg(t){
  if (t.length > 3 && t.endsWith("s")) t = t.slice(0, -1);
  if (t.length > 3 && "aeo".includes(t[t.length - 1])) t = t.slice(0, -1);
  return t;
}
function tokensSeg(s){
  const crudo = normalizar(String(s))
    .replace(/(\d),(\d)/g, "$1.$2")
    .replace(/([0-9])([a-zñ])/g, "$1 $2")
    .replace(/([a-zñ])([0-9])/g, "$1 $2")
    .replace(/[^a-z0-9ñ.]+/g, " ")
    .split(/\s+/).filter(Boolean);
  const res = [];
  crudo.forEach(t => {
    t = t.replace(/^\.+|\.+$/g, ""); if (!t) return;
    if (/^\d+(\.\d+)?$/.test(t)){ res.push(t.replace(/\.0+$/, "")); return; }
    if (t.length === 1 && !"wvmlg".includes(t)) return;
    if (STOP_SEG.has(t)) return;
    const sinS = (t.length > 3 && t.endsWith("s")) ? t.slice(0, -1) : t;
    const sin = SINONIMOS_SEG[t] || SINONIMOS_SEG[sinS];
    res.push(raizSeg(sin || sinS));

    if (!palabras.length) return;

      const prev = palabras[i-1], sig = palabras[i+1];
      if (esNum(w) && actual.length && prev && !ATRIBUTO_PREVIO.has(prev) && !esNum(prev) && sig != null && !UNIDAD_SEG.has((tokensSeg(sig)[0] || ""))){

function analizar(texto){
  const lineas = [], usado = new Set();
  const resto = analizarSegmentos(texto, lineas, usado);
  analizarReglas(resto, lineas, usado);
  // si los paneles entraron por segmentos, añade su estructura (como hacían las reglas)
  const mod = lineas.find(l => /Módulo FV/i.test(l.concepto));
  if (mod && !usado.has("estructura")){
    const it = precioDe("estructura");
    if (it) lineas.push({concepto: it.nombre, cant: mod.cant, unidad: it.unidad, precio: it.precio, tiempo: it.tiempo || 0, esMO: false});
  }
  return lineas;
}

/* ================= DIARIO POR VOZ ================= */
const hhmm = min => String(Math.floor(min/60)%24).padStart(2,"0") + ":" + String(min%60).padStart(2,"0");
function extraerCliente(desc){
  const d = " " + desc + " ";
  const limpiar = s => s.split(/\s+(?:a\s+por|para|que|donde|y\s+(?:luego|despues|ahora)|con\s+el|con\s+la)\s+/i)[0].replace(/\s+/g," ").trim();
  let m = d.match(/(?:casa|almac[eé]n|obra|nave|finca|taller|tienda|bar|restaurante|cortijo|chalet|cooperativa)\s+(?:de\s+)?[^,.;]{3,45}/i);
  if (m) return limpiar(m[0]);
  m = d.match(/\b(?:en|para|donde)\s+(?:el\s+|la\s+|los\s+|las\s+)?([^,.;]{3,45})/i);
  if (m) return limpiar(m[1]);
  return "";
}
function analizarDia(texto){
  const re = /(?:desde|de)\s+(?:las?\s+)?(\d{1,2})(?:[:.h](\d{2}))?\s*(?:h(?:oras)?\b)?\s*(?:hasta|a)\s+(?:las?\s+)?(\d{1,2})(?:[:.h](\d{2}))?/gi;
  const marcas = []; let m;
  while ((m = re.exec(texto))) marcas.push({i: m.index, fin: m.index + m[0].length, h1: +m[1], m1: +(m[2]||0), h2: +m[3], m2: +(m[4]||0)});
  return marcas.map((mk, idx) => {
    const hastaTxt = idx+1 < marcas.length ? marcas[idx+1].i : texto.length;
    const desc = texto.slice(mk.fin, hastaTxt).replace(/^[\s,.:;yY]+|[\s,.:;y]+$/g, "").trim();
    const d1 = mk.h1*60 + mk.m1;
    let d2 = mk.h2*60 + mk.m2;
    if (d2 <= d1) d2 += 12*60;                       // «de 10 a 2» → 10:00-14:00
    return {desde: hhmm(d1), hasta: hhmm(d2), horas: Math.round((d2-d1)/6)/10, texto: desc, nombreCliente: extraerCliente(desc)};
  }).filter(e => e.texto);
}

function ventaLinea(l, margen){
  const base = (+l.cant||0) * (+l.precio||0);
  return l.esMO ? base : base * (1 + (+margen||0)/100);
}
function totales(p){
  const coste = (p.lineas||[]).reduce((s,l) => s + (+l.cant||0)*(+l.precio||0), 0);
  const venta = (p.lineas||[]).reduce((s,l) => s + ventaLinea(l, p.margen), 0);
  const iva = p.conIva ? venta * (+p.iva||0)/100 : 0;
  return {coste, venta, iva, total: venta + iva, beneficio: venta - coste};
}

  const f = ev.target.files[0]; if (!f) return;
  const img = new Image();
  img.onload = () => {
    const c = document.createElement("canvas");
    const esc = Math.min(1, 900 / Math.max(img.width, img.height));
    c.width = img.width * esc; c.height = img.height * esc;
    c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
    (editando.fotos = editando.fotos || []).push(c.toDataURL("image/jpeg", .6));

const soportaContactos = () => ("contacts" in navigator && "select" in navigator.contacts);
async function importarContactos(idCliente){
  if (!soportaContactos()){ alert("Tu navegador no permite abrir los contactos. Funciona en Chrome para Android con la app instalada desde la web."); return; }
  try {
    const sel = await navigator.contacts.select(["name","tel","email"], {multiple: !idCliente});
    let nuevos = 0, actualizados = 0;
    sel.forEach(ct => {
      const nombre = (ct.name && ct.name[0] || "").trim();
      const tel = (ct.tel && ct.tel[0] || "").trim();
      const email = (ct.email && ct.email[0] || "").trim();
      if (idCliente){
        const c = state.clientes.find(x => x.id === idCliente);
        if (c){ if (nombre) c.nombre = nombre; if (tel) c.telefono = tel; if (email) c.email = email; c.autoCreado = false; actualizados++; }
      } else if (nombre){
        const ex = clientePorNombre(nombre);
        if (ex){ if (tel && !ex.telefono) ex.telefono = tel; if (email && !ex.email) ex.email = email; actualizados++; }
        else { state.clientes.push({id: uid(), nombre, telefono: tel, email, autoCreado: false}); nuevos++; }
      }
    });
    marcarCambio(); render();
    if (nuevos || actualizados) alert(`📇 Contactos: ${nuevos} cliente(s) nuevo(s), ${actualizados} actualizado(s). Ya tienen su botón de llamada y WhatsApp.`);
  } catch(e){ /* cancelado por el usuario */ }
}

/* ================= COPILOTO: AVISOS PROACTIVOS ================= */
const amin = h => { const [a,b] = String(h||"0:0").split(":"); return (+a)*60+(+b||0); };
const diasDesde = f => Math.max(0, Math.round((Date.parse(hoy()) - Date.parse(f)) / 864e5));
function avisosAsistente(){
  const avisos = [];
  // ---- diario: huecos, jornadas cortas, entradas sin cliente ----
  const porDia = {};
  (state.diario||[]).forEach(e => { (porDia[e.fecha] = porDia[e.fecha] || []).push(e); });
  Object.entries(porDia).forEach(([f, ents]) => {
    ents.sort((a,b) => a.desde.localeCompare(b.desde));
    for (let i = 1; i < ents.length; i++){
      const hueco = amin(ents[i].desde) - amin(ents[i-1].hasta);
      if (hueco >= 30) avisos.push({ico:"⏳", txt:`Hueco de ${Math.round(hueco/6)/10} h el ${fFecha(f)} entre las ${ents[i-1].hasta} y las ${ents[i].desde}. ¿Falta un tramo por apuntar?`, v:"partes"});
    }
    const th = ents.reduce((s,e) => s + (+e.horas||0), 0);
    if (f !== hoy() && th > 0 && th < 6) avisos.push({ico:"📅", txt:`La jornada del ${fFecha(f)} solo tiene ${Math.round(th*10)/10} h apuntadas. ¿Está completa?`, v:"partes"});
    ents.filter(e => !e.clienteId).forEach(e => avisos.push({ico:"👤", txt:`La entrada del ${fFecha(f)} a las ${e.desde} no tiene cliente asignado.`, v:"partes"}));
  });
  // ---- partes valorados ----
  (state.partes||[]).forEach(p => {
    if (p.estado === "pendiente" && diasDesde(p.fecha) > 15) avisos.push({ico:"💶", txt:`El parte ${p.numero} lleva ${diasDesde(p.fecha)} días pendiente de facturar${p.cliente?" ("+p.cliente+")":""}.`, id:p.id});
    if (!p.firma) avisos.push({ico:"✍️", txt:`El parte ${p.numero} no tiene la firma del cliente.`, id:p.id});
  });
  // ---- presupuestos ----
  (state.presupuestos||[]).forEach(p => {
    const d = diasDesde(p.fecha);
    if (p.estado === "borrador" && d > 7) avisos.push({ico:"📋", txt:`El presupuesto ${p.numero} lleva ${d} días en borrador sin enviar.`, id:p.id});
    if (p.estado === "enviado" && d > 15) avisos.push({ico:"📞", txt:`Enviaste el ${p.numero} hace ${d} días${p.cliente?" a "+p.cliente:""}. Toca hacer seguimiento antes de que se enfríe.`, id:p.id});
    const lin = p.lineas || [];
    if (lin.some(l => !l.esMO && l.concepto) && !lin.some(l => l.esMO)){
      const he = horasEstimadas(p);
      avisos.push({ico:"👷", txt:`El presupuesto ${p.numero} no incluye mano de obra.${he ? ` Por los materiales, estimo ${he} h (≈ ${Math.max(1,Math.ceil(he/8))} jornadas).` : ""}`, id:p.id});
    }
    if (lin.some(l => /Módulo FV/i.test(l.concepto)) && !lin.some(l => /Legalizaci/i.test(l.concepto)))
      avisos.push({ico:"📄", txt:`El ${p.numero} es de fotovoltaica pero no incluye legalización (RD 244/2019).`, id:p.id});
    if (lin.some(l => /wallbox|cargador/i.test(l.concepto)) && !lin.some(l => /protec/i.test(l.concepto)))
      avisos.push({ico:"🛡️", txt:`El ${p.numero} lleva cargador de VE pero no veo protecciones de la línea.`, id:p.id});
  });
  // ---- clientes ----
  (state.clientes||[]).filter(c => c.autoCreado && !c.telefono).forEach(c =>
    avisos.push({ico:"📱", txt:`Al cliente «${c.nombre}» (creado desde el diario) le falta el teléfono para poder enviarle documentos por WhatsApp.`, v:"clientes"}));
  // ---- garantías ----

function subirLogo(ev){
  const f = ev.target.files[0]; if(!f) return;
  const img = new Image();
  img.onload = () => {                                     // redimensiona para que pese poco (PDF, sync y almacenamiento)
    const c = document.createElement("canvas");
    const e2 = Math.min(1, 420 / Math.max(img.width, img.height));
    c.width = Math.max(1, Math.round(img.width * e2)); c.height = Math.max(1, Math.round(img.height * e2));
    c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
    state.config.empresa.logo = c.toDataURL("image/png");
    URL.revokeObjectURL(img.src); marcarCambio(); render();
  };
  img.src = URL.createObjectURL(f); ev.target.value = "";
}

async function iaJSON(sistema, usuario){
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {"content-type":"application/json", "x-api-key": state.config.apiKey.trim(),
      "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true"},
    body: JSON.stringify({model: state.config.modeloIA || "claude-sonnet-4-5", max_tokens: 2000,
      system: sistema, messages:[{role:"user", content: usuario}]})
  });
  if (!r.ok) throw new Error("API " + r.status);
  const d = await r.json();
  const txt = (d.content && d.content[0] && d.content[0].text || "").replace(/^```json?\s*|\s*```$/g, "").trim();
  return JSON.parse(txt.slice(txt.indexOf("{"), txt.lastIndexOf("}")+1));
}
function iaBasePrecios(){
  return state.precios.map(p => `${p.k}|${p.nombre}|${p.precio}€/${p.unidad}|${p.tiempo||0}h${p.esMO?"|MO":""}`).join("\n");
}
async function iaPresupuesto(txt, tipo){
  const sis = `Eres el motor de PresuVolt, app de presupuestos y partes para instaladores (electricidad, FV, aerotermia, clima) en España. Devuelve SOLO un JSON válido, sin explicaciones: {"cliente":"","telefono":"","obra":"","observaciones":"","lineas":[{"k":"clave de la base si existe","concepto":"","cant":1,"precio":0,"esMO":false}]}. Usa la clave k de la base de precios del usuario siempre que el concepto exista en ella (el precio y tiempo se tomarán de su base). Si algo no está en la base, pon concepto y precio de coste orientativo en España. Sé exhaustivo: incluye SIEMPRE la mano de obra estimada, y protecciones/cableado/legalización cuando el trabajo lo requiera.\nBASE DE PRECIOS (k|nombre|precio|horas|MO=mano de obra):\n${iaBasePrecios()}`;
  const j = await iaJSON(sis, `${tipo === "parte" ? "PARTE DE TRABAJO realizado" : "PRESUPUESTO a preparar"}: ${txt}`);
  const lineas = (j.lineas||[]).map(l => {
    const it = l.k ? precioDe(l.k) : null;
    return it ? {concepto: l.concepto || it.nombre, cant: +l.cant||1, unidad: it.unidad, precio: it.precio, tiempo: it.tiempo||0, esMO: !!it.esMO}
              : {concepto: l.concepto||"", cant: +l.cant||1, unidad:"ud", precio: +l.precio||0, tiempo: 0, esMO: !!l.esMO};
  }).filter(l => l.concepto);
  return {lineas, cliente: j.cliente||"", telefono: j.telefono||"", obra: j.obra||"", observaciones: j.observaciones||""};
}
async function iaDiario(txt){
  const sis = `Trocea el relato de la jornada de un instalador en entradas. Devuelve SOLO JSON: {"entradas":[{"desde":"HH:MM","hasta":"HH:MM","texto":"qué hizo, redactado profesional y breve","cliente":"nombre del cliente o lugar, vacío si no hay"}]}. Clientes que ya existen (usa el nombre exacto si coincide): ${state.clientes.map(c=>c.nombre).join(", ") || "ninguno"}.`;
  const j = await iaJSON(sis, txt);
  return (j.entradas||[]).map(e => ({desde: e.desde, hasta: e.hasta,
    horas: Math.max(Math.round(((amin(e.hasta)<=amin(e.desde)?amin(e.hasta)+720:amin(e.hasta))-amin(e.desde))/6)/10, 0),
    texto: e.texto||"", nombreCliente: e.cliente||""})).filter(e => e.texto && e.desde);
}

let rec = null, grabando = false;
function toggleGrabacion(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR){ alert("Este navegador no soporta dictado. Abre PresuVolt en Chrome (Android) y funcionará. También puedes escribir la nota o usar el micrófono del teclado."); return; }
  if (grabando){ try{ rec.stop(); }catch(e){} return; }
  rec = new SR();
  rec.lang = "es-ES"; rec.continuous = true; rec.interimResults = false;
  rec.onresult = ev => {
    let txt = "";
    for (let i = ev.resultIndex; i < ev.results.length; i++)
      if (ev.results[i].isFinal) txt += ev.results[i][0].transcript;
    txt = txt.trim();
    if (txt){
      textoNota = textoNota ? textoNota.replace(/\s+$/,"") + " " + txt : txt.charAt(0).toUpperCase()+txt.slice(1);
      const ta = $("#texto-nota"); if (ta) ta.value = textoNota;
    }
  };
  rec.onend = () => { grabando = false; pintarVoz(); };
  rec.onerror = ev => { grabando = false; pintarVoz(); if (ev.error === "not-allowed") alert("No hay permiso de micrófono. Actívalo en el navegador."); };
  try { rec.start(); grabando = true; } catch(e){ grabando = false; }
  pintarVoz();
}
function pintarVoz(){
  const b = $("#btn-voz"), e = $("#estado-voz");
  if (b){ b.classList.toggle("grabando", grabando); b.textContent = grabando ? "⏹️" : "🎤"; }
  if (e) e.textContent = grabando ? "Grabando… pulsa para parar" : "Pulsa para hablar";
}

  ctx.strokeStyle = "#1A1C1E"; ctx.lineWidth = 2.2; ctx.lineCap = "round"; ctx.lineJoin = "round";
  let ux = 0, uy = 0;

  c.onpointerup = c.onpointercancel = () => { firmaDibujando = false; };
}

async function cargarLibsPDF(){
  const cargar = u => new Promise((ok, ko) => { const s = document.createElement("script"); s.src = u; s.onload = ok; s.onerror = () => ko(new Error("sin conexión para descargar el generador de PDF")); document.head.appendChild(s); });
  if (!window.html2canvas) await cargar("https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js");
  if (!window.jspdf) await cargar("https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js");
}
async function generarPDF(p){
  await cargarLibsPDF();
  const cont = document.createElement("div");
  cont.style.cssText = "position:fixed;left:-10000px;top:0;width:794px;background:#fff";
  cont.innerHTML = docHtml(p);
  document.body.appendChild(cont);
  const canvas = await html2canvas(cont, {scale: 2, backgroundColor: "#ffffff", useCORS: true, logging: false});
  document.body.removeChild(cont);
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({unit: "mm", format: "a4", compress: true});
  const margen = 8, util = 210 - margen * 2;
  const pxPorMM = canvas.width / util;
  const altoPaginaPx = Math.floor((297 - margen * 2) * pxPorMM);
  let y = 0, primera = true;
  while (y < canvas.height){
    const trozo = document.createElement("canvas");
    trozo.width = canvas.width; trozo.height = Math.min(altoPaginaPx, canvas.height - y);
    trozo.getContext("2d").drawImage(canvas, 0, y, canvas.width, trozo.height, 0, 0, canvas.width, trozo.height);
    if (!primera) pdf.addPage();
    pdf.addImage(trozo.toDataURL("image/jpeg", 0.92), "JPEG", margen, margen, util, trozo.height / pxPorMM);
    primera = false; y += altoPaginaPx;
  }
  return pdf.output("blob");
}

    alert("No pude generar el PDF (" + (e && e.message || e) + "). Puedes usar el botón 🖨️ e imprimir como PDF.");
  }

function enviarPDFListo(){
  if (!pdfPendiente) return;
  const archivos = [pdfPendiente.archivo];
  // 1er intento: archivo + texto. En algunos Android falla la mezcla → 2º intento solo archivo.
  navigator.share({files: archivos, title: pdfPendiente.titulo, text: pdfPendiente.texto})
    .then(() => cerrarModal())
    .catch(e1 => {
      if (e1 && e1.name === "AbortError") return;            // el usuario cerró el menú: no es un error
      navigator.share({files: archivos})
        .then(() => cerrarModal())
        .catch(e2 => {
          if (e2 && e2.name === "AbortError") return;
          const motivo = (e2 && (e2.name + ": " + e2.message)) || (e1 && (e1.name + ": " + e1.message)) || "desconocido";
          guardarPDFListo(false);
          alert("Tu móvil no ha dejado abrir el menú de compartir (" + motivo + ").\n\n" +
            "Te he GUARDADO el PDF en la carpeta Descargas. Para enviarlo:\n" +
            "1. Abre WhatsApp y el chat del cliente.\n" +
            "2. Toca el clip 📎 → Documento.\n" +
            "3. Elige " + pdfPendiente.archivo.name);
          cerrarModal();
        });
    });
}
function guardarPDFListo(cerrar){
  if (!pdfPendiente) return;
  const a = document.createElement("a");
  a.href = URL.createObjectURL(pdfPendiente.archivo); a.download = pdfPendiente.archivo.name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  if (cerrar !== false){
    alert("PDF guardado en Descargas: " + pdfPendiente.archivo.name);
    cerrarModal();
  }
}

  a.href = URL.createObjectURL(blob);
  a.download = "presuvolt-datos-" + hoy() + ".json";
  a.click(); URL.revokeObjectURL(a.href);
  cambiosSinGuardar = false;
}
function importarDatos(ev){
  const f = ev.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = () => {
    try{
      const d = JSON.parse(r.result);
      if (!d.config || !Array.isArray(d.precios)) throw new Error("formato");
      state = migrar(d); guardarLocal(); cambiosSinGuardar = false; editando = null;
      render();
    } catch { alert("El archivo no es una copia de PresuVolt válida."); }
  };
  r.readAsText(f); ev.target.value = "";
}
/* ================= SINCRONIZACIÓN EN EQUIPO (Firebase Firestore) =================
   Diseño v1: último-en-escribir-gana por documento, borrados con marca (eliminado:true),
   cada documento lleva actualizadoEn + dispositivo. La clave de IA y los ajustes
   personales NO se sincronizan. Funciona offline: Firestore guarda la cola en el
   dispositivo y la sube sola al volver la señal. */
const CLAVE_SYNC = "presuvolt-sync";
const URL_FIREBASE = "https://www.gstatic.com/firebasejs/10.12.2/";
const sync = {activo:false, listo:{}, fs:null, db:null, cfg:null, estado:"apagado", error:"", ultimo:0, pendientes:0, shadow:{}, unsubs:[], timer:null, hb:null, equipo:[]};
const COLS_SYNC = [
  {n:"clientes",     lista:()=>state.clientes},
  {n:"presupuestos", lista:()=>state.presupuestos},
  {n:"partes",       lista:()=>state.partes},
  {n:"diario",       lista:()=>state.diario},
  {n:"precios",      lista:()=>state.precios, clave:"k"}
];
const CONFIG_COMPARTIDA = ["empresa","margen","iva","conIva","condiciones","sellos"]; // apiKey, modeloIA, prefijos, objetivo… se quedan en el dispositivo
function idSync(c, item){ return String(item[c.clave || "id"] || "").replace(/[\/.#$\[\]]/g, "_"); }
function limpiarObj(o){ return JSON.parse(JSON.stringify(o)); }
function jsonCanonico(v){
  if (Array.isArray(v)) return "[" + v.map(jsonCanonico).join(",") + "]";
  if (v && typeof v === "object") return "{" + Object.keys(v).sort().map(k => JSON.stringify(k) + ":" + jsonCanonico(v[k])).join(",") + "}";
  return JSON.stringify(v === undefined ? null : v);
}
function configCompartida(){
  const o = {};
  CONFIG_COMPARTIDA.forEach(k => { if (state.config[k] !== undefined) o[k] = state.config[k]; });
  const l = limpiarObj(o);
  // Firestore limita cada documento a 1 MB: si el logo es enorme, no se comparte (cada uno puede subir el suyo)
  if (l.empresa && jsonCanonico(l).length > 900000) l.empresa = Object.assign({}, l.empresa, {logo: ""});
  return l;
}
function leerCfgSync(){ try { return JSON.parse(localStorage.getItem(CLAVE_SYNC)); } catch(e){ return null; } }
function guardarCfgSync(c){ try { localStorage.setItem(CLAVE_SYNC, JSON.stringify(c)); } catch(e){} }
function parseFirebaseCfg(txt){
  const out = {};
  ["apiKey","authDomain","projectId","storageBucket","messagingSenderId","appId"].forEach(k => {
    const m = String(txt || "").match(new RegExp('["\']?' + k + '["\']?\\s*[:=]\\s*["\']([^"\']+)["\']'));
    if (m) out[k] = m[1];
  });
  return out;
}
function chipSync(){
  const el = document.getElementById("chip-sync");
  if (!el) return;
  if (!sync.activo){ el.style.display = "none"; return; }
  el.style.display = "";
  el.textContent = !navigator.onLine ? "📴 pendiente" :
    sync.pendientes > 0 ? "⏳ subiendo…" :
    sync.estado === "error" ? "⚠️ sync" :
    sync.estado === "conectando" ? "☁️ conectando…" : "☁️ sincronizado";
}
function programarRenderSync(){ if (vista !== "editor") render(); else chipSync(); }
function refDoc(colName, id){ return sync.fs.doc(sync.db, "empresas", sync.cfg.codigo, colName, id); }
function pvSyncProgramar(){ if (!sync.activo) return; clearTimeout(sync.timer); sync.timer = setTimeout(pvSyncPush, 800); }
function anotarOp(prom){
  sync.pendientes++; chipSync();
  prom.then(() => { sync.ultimo = Date.now(); if (sync.estado !== "apagado") sync.estado = "sincronizado"; sync.error = ""; })
      .catch(e => { sync.error = String(e && e.message || e); if (sync.activo) sync.estado = "error"; })
      .then(() => { sync.pendientes = Math.max(0, sync.pendientes - 1); chipSync(); });
}
function pvSyncPush(){
  if (!sync.activo || !sync.db || !sync.cfg) return;
  const ahora = Date.now(), disp = sync.cfg.dispositivo;
  COLS_SYNC.forEach(c => {
    if (!sync.listo[c.n]) return;               // hasta recibir el estado del servidor no empujamos (evita pisar datos más nuevos)
    const vivos = new Set();
    (c.lista() || []).forEach(item => {
      const id = idSync(c, item); if (!id) return;
      vivos.add(id);
      const key = c.n + "/" + id;
      if (sync.shadow[key] === jsonCanonico(item)) return;
      item.actualizadoEn = ahora; item.dispositivo = disp;
      const datos = limpiarObj(item);
      sync.shadow[key] = jsonCanonico(datos);
      anotarOp(sync.fs.setDoc(refDoc(c.n, id), {datos, actualizadoEn: ahora, dispositivo: disp, eliminado: false}));
    });
    Object.keys(sync.shadow).forEach(key => {   // lápidas: estaba en la nube y ya no está local → marcado como eliminado
      if (!key.startsWith(c.n + "/")) return;
      const id = key.slice(c.n.length + 1);
      if (vivos.has(id)) return;
      delete sync.shadow[key];
      anotarOp(sync.fs.setDoc(refDoc(c.n, id), {eliminado: true, actualizadoEn: ahora, dispositivo: disp}));
    });
  });
  if (sync.listo.config){
    const datos = configCompartida();
    if (sync.shadow["config"] !== jsonCanonico(datos)){
      sync.shadow["config"] = jsonCanonico(datos);
      state.config.syncTs = ahora;
      anotarOp(sync.fs.setDoc(refDoc("config", "compartida"), {datos, actualizadoEn: ahora, dispositivo: disp}));
    }
  }
}
function aplicarRemoto(colName, id, d){
  const c = COLS_SYNC.find(x => x.n === colName); if (!c) return false;
  const arr = c.lista(); if (!Array.isArray(arr)) return false;
  const key = colName + "/" + id;
  const i = arr.findIndex(x => idSync(c, x) === id);
  // "Sucio" = tiene cambios locales aún sin subir: no se pisa; se subirá con sello nuevo y entonces ganará (último en escribir gana)
  const sucio = i >= 0 && sync.shadow[key] !== undefined && sync.shadow[key] !== jsonCanonico(arr[i]);
  if (d.eliminado){
    delete sync.shadow[key];
    if (i >= 0 && !sucio && (d.actualizadoEn || 0) >= (arr[i].actualizadoEn || 0)){ arr.splice(i, 1); return true; }
    return false;
  }
  const datos = d.datos || {};
  sync.shadow[key] = jsonCanonico(datos);
  if (i < 0){ arr.push(datos); return true; }
  // Un precio TUYO (ref:false) nunca lo pisa el precio de referencia de fábrica de otro dispositivo:
  // se mantiene el tuyo y se re-sube, ganando por sello más nuevo.
  if (colName === "precios" && arr[i].ref === false && datos.ref === true) return false;
  if (!sucio && (d.actualizadoEn || 0) > (arr[i].actualizadoEn || 0)){ arr[i] = datos; return true; }
  return false;
}
function aplicarConfigRemota(d){
  sync.shadow["config"] = jsonCanonico(d.datos || {});
  const datos = limpiarObj(d.datos || {});
  // Una config sin rellenar (sin nombre de empresa) nunca pisa una config con datos:
  // la tuya se re-sube y gana. Evita que un dispositivo recién instalado borre empresa y logo.
  const remotaVacia = !(datos.empresa && datos.empresa.nombre);
  const localConDatos = !!(state.config.empresa && state.config.empresa.nombre);
  if (remotaVacia && localConDatos) return false;
  if ((d.actualizadoEn || 0) > (state.config.syncTs || 0)){
    Object.assign(state.config, datos);
    state.config.syncTs = d.actualizadoEn || Date.now();
    return true;
  }
  return false;
}
async function conectarSync(){
  sync.estado = "conectando"; sync.error = ""; chipSync();
  const [appM, fsM] = await Promise.all([import(URL_FIREBASE + "firebase-app.js"), import(URL_FIREBASE + "firebase-firestore.js")]);
  let app;
  try { app = appM.initializeApp(sync.cfg.firebase, "presuvolt"); } catch(e){ app = appM.getApp("presuvolt"); }
  let db;
  try { db = fsM.initializeFirestore(app, {localCache: fsM.persistentLocalCache({tabManager: fsM.persistentMultipleTabManager()})}); }
  catch(e){ db = fsM.getFirestore(app); }
  sync.fs = fsM; sync.db = db; sync.activo = true; sync.listo = {};
  COLS_SYNC.forEach(c => {
    sync.unsubs.push(fsM.onSnapshot(fsM.collection(db, "empresas", sync.cfg.codigo, c.n), snap => {
      let cambio = false;
      snap.docChanges().forEach(ch => {
        if (ch.type === "removed") return;
        if (aplicarRemoto(c.n, ch.doc.id, ch.doc.data())) cambio = true;
      });
      if (!snap.metadata.fromCache){ sync.listo[c.n] = true; sync.ultimo = Date.now(); if (sync.estado !== "error") sync.estado = "sincronizado"; }
      if (cambio){ guardarLocal(); programarRenderSync(); }
      chipSync(); pvSyncProgramar();
    }, err => { sync.error = String(err && err.message || err); sync.estado = "error"; chipSync(); }));
  });
  sync.unsubs.push(fsM.onSnapshot(fsM.doc(db, "empresas", sync.cfg.codigo, "config", "compartida"), snap => {
    const existe = typeof snap.exists === "function" ? snap.exists() : !!snap.exists;
    if (existe && aplicarConfigRemota(snap.data())){ guardarLocal(); programarRenderSync(); }
    if (!snap.metadata.fromCache) sync.listo.config = true;
    chipSync(); pvSyncProgramar();
  }, err => { sync.error = String(err && err.message || err); sync.estado = "error"; chipSync(); }));
  sync.unsubs.push(fsM.onSnapshot(fsM.collection(db, "empresas", sync.cfg.codigo, "dispositivos"), snap => {
    sync.equipo = snap.docs.map(x => Object.assign({id: x.id}, x.data()));
    if (vista === "ajustes") programarRenderSync();
  }, () => {}));
  latidoSync(); clearInterval(sync.hb); sync.hb = setInterval(latidoSync, 5 * 60 * 1000);
  chipSync();
}
function latidoSync(){
  if (!sync.activo || !sync.fs) return;
  try { sync.fs.setDoc(refDoc("dispositivos", sync.cfg.dispositivo), {nombre: sync.cfg.iniciales || "—", ultimaVez: Date.now()}).catch(() => {}); } catch(e){}
}
function iniciarSyncSiConfigurado(){
  const c = leerCfgSync();
  if (c && c.firebase && c.codigo){
    sync.cfg = c;
    conectarSync().catch(e => { sync.error = String(e && e.message || e); sync.estado = "error"; chipSync(); });
  }
}
async function activarSync(){
  const fb = parseFirebaseCfg($("#sync-cfg").value);
  const codigo = String($("#sync-codigo").value || "").trim().toLowerCase().replace(/\s+/g, "-").replace(/[\/.#$\[\]]/g, "");
  const ini = String($("#sync-ini").value || "").trim().toUpperCase().replace(/[^A-ZÑ0-9]/g, "").slice(0, 3);
  if (!fb.apiKey || !fb.projectId){ alert("No he podido leer la configuración de Firebase. Pega el bloque completo que te da la consola (con apiKey, projectId, appId…)."); return; }
  if (codigo.length < 8){ alert("El código de empresa debe ser una frase larga y difícil de adivinar (mínimo 8 caracteres), p. ej. volt-almendralejo-7492-garcia"); return; }
  if (!ini){ alert("Pon tus iniciales (1-3 letras). Se usan para numerar tus documentos (p. ej. PV-J-2026-001) y que no choquen con los de tu socio al trabajar sin cobertura."); return; }
  if (!navigator.onLine){ alert("Para activar la sincronización necesitas internet la primera vez. Después ya funciona sin cobertura."); return; }
  const previo = leerCfgSync();
  sync.cfg = {firebase: fb, codigo, iniciales: ini, dispositivo: (previo && previo.dispositivo) || uid()};
  guardarCfgSync(sync.cfg);
  try {
    await conectarSync();
    alert("☁️ Sincronización activada. Tus datos se están subiendo a la nube.\n\nPara que tu socio vea lo mismo: en su teléfono, en Ajustes → Sincronización en equipo, tiene que pegar la misma configuración de Firebase, escribir el mismo código de empresa y poner SUS iniciales.");
  } catch(e){
    sync.activo = false; sync.estado = "apagado"; sync.cfg = null;
    try { localStorage.removeItem(CLAVE_SYNC); } catch(_){}
    alert("No se pudo activar la sincronización: " + (e && e.message || e));
  }
  render(); chipSync();
}
function desactivarSync(){
  if (!confirm("¿Desactivar la sincronización en este dispositivo? Tus datos se quedan aquí y en la nube; simplemente dejan de sincronizarse.")) return;
  sync.unsubs.forEach(u => { try { u(); } catch(e){} });
  sync.unsubs = []; clearInterval(sync.hb); clearTimeout(sync.timer);
  sync.activo = false; sync.estado = "apagado"; sync.shadow = {}; sync.listo = {}; sync.cfg = null; sync.equipo = []; sync.pendientes = 0;
  try { localStorage.removeItem(CLAVE_SYNC); } catch(e){}
  chipSync(); render();
}
function htmlSyncAjustes(){
  let cuerpo;
  if (sync.activo || sync.estado === "conectando"){
    const eq = (sync.equipo || []).map(d => {
      const min = Math.round((Date.now() - (d.ultimaVez || 0)) / 60000);
      const est = min < 10 ? "🟢 en línea" : "⚪ hace " + (min < 60 ? min + " min" : Math.round(min / 60) + " h");
      const yo = sync.cfg && d.id === sync.cfg.dispositivo;
      return `<span class="chip ${yo ? "mio" : "ref"}">${esc(d.nombre || "—")} · ${est}${yo ? " (tú)" : ""}</span>`;
    }).join(" ");
    cuerpo = `
    <p style="font-size:.92rem;margin-bottom:10px">Estado: <strong>${sync.estado === "conectando" ? "☁️ conectando…" : !navigator.onLine ? "📴 sin conexión — los cambios se guardan aquí y subirán solos al volver la señal" : sync.estado === "error" ? "⚠️ error: " + esc(sync.error) : "☁️ sincronizado en equipo"}</strong>${sync.ultimo ? ` · último sync a las ${new Date(sync.ultimo).toLocaleTimeString("es-ES", {hour: "2-digit", minute: "2-digit"})}` : ""}${sync.pendientes ? ` · ⏳ ${sync.pendientes} cambio(s) subiendo` : ""}</p>
    <div class="rejilla c2">
      <div><label>Código de empresa (compártelo solo con tu socio)</label><input value="${esc(sync.cfg ? sync.cfg.codigo : "")}" readonly onclick="this.select()"></div>
      <div><label>Tus iniciales (numeración ${esc(state.config.prefijo)}${sync.cfg && sync.cfg.iniciales ? "-" + esc(sync.cfg.iniciales) : ""}-${new Date().getFullYear()}-001)</label><input value="${esc(sync.cfg ? sync.cfg.iniciales : "")}" readonly></div>
    </div>
    <div style="margin-top:12px"><label>Equipo conectado</label>${eq || `<span style="color:var(--gris);font-size:.9rem">De momento solo este dispositivo. Cuando tu socio active la sincronización aparecerá aquí.</span>`}</div>
    <div class="pie-form" style="justify-content:flex-start">
      <button class="btn sec mini" onclick="pvSyncPush();latidoSync();alert('Cambios pendientes mandados a la nube.')">🔄 Sincronizar ahora</button>
      <button class="btn peligro mini" onclick="desactivarSync()">Desactivar en este dispositivo</button>
    </div>
    <p style="font-size:.8rem;color:var(--gris)">🔒 Se comparten clientes, presupuestos, partes, diario, precios y los datos de empresa. Tu clave de la IA y tus ajustes personales no salen de este dispositivo.</p>`;
  } else {
    cuerpo = `
    <p style="font-size:.9rem;color:var(--gris);margin-bottom:10px">Para que tú y tu socio veáis los mismos clientes, presupuestos, partes, diario y precios — cada uno desde su teléfono y aunque estéis sin cobertura en el tajo. Hace falta una cuenta gratuita de Firebase (Google); son 5 minutos y cuesta 0 €:</p>
    <ol style="font-size:.9rem;color:var(--gris);margin:0 0 12px 20px;line-height:1.7">
      <li>Entra en <strong>console.firebase.google.com</strong> con tu cuenta de Google y crea un proyecto (p. ej. «presuvolt»).</li>
      <li><strong>Firestore Database → Crear base de datos</strong>, y en la pestaña <strong>Reglas</strong> pega las reglas de la guía de sincronización.</li>
      <li>En <strong>Configuración del proyecto → Tus apps → icono web («&lt;/&gt;»)</strong>, registra la app y copia el bloque <code>firebaseConfig</code>.</li>
      <li>Pégalo aquí abajo, inventa el código de empresa y pásaselo a tu socio por WhatsApp.</li>
    </ol>
    <div style="margin-bottom:10px"><label>Configuración de Firebase (pega el bloque firebaseConfig tal cual)</label>
      <textarea id="sync-cfg" rows="5" style="font-family:'IBM Plex Mono',monospace;font-size:13px" placeholder='const firebaseConfig = { apiKey: "AIza…", projectId: "presuvolt-xxxxx", … };'></textarea></div>
    <div class="rejilla c2">
      <div><label>Código de empresa (frase secreta inventada por ti)</label><input id="sync-codigo" placeholder="volt-almendralejo-7492-garcia"></div>
      <div><label>Tus iniciales (1-3 letras, p. ej. J)</label><input id="sync-ini" maxlength="3" placeholder="J"></div>
    </div>
    <div class="pie-form" style="justify-content:flex-start">
      <button class="btn amarillo" onclick="activarSync()">☁️ Activar sincronización</button>
    </div>
    <p style="font-size:.8rem;color:var(--gris)">🔒 Tu clave de la IA y tus ajustes personales no se comparten. Funciona sin cobertura: los cambios se apuntan en el teléfono y se suben solos al volver la señal.</p>`;
  }
  return `<div class="sep"></div><h3 class="sub">☁️ Sincronización en equipo</h3>${cuerpo}`;
}
window.addEventListener("online", () => { chipSync(); pvSyncProgramar(); });
window.addEventListener("offline", chipSync);
render();
iniciarSyncSiConfigurado();
/* ================= PWA ================= */
if ("serviceWorker" in navigator && (location.protocol === "https:" || location.hostname === "localhost")) {
  navigator.serviceWorker.register("sw.js", {updateViaCache: "none"}).catch(()=>{});
}
</script>
